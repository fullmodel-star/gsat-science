<title>學測自然複習 · 總入口</title>
<style>
:root{
  /* 稜線識別 theme-pine 對映（松綠，扁平無漸層無陰影） */
  --accent:#3EA47E; --accent2:#3EA47E; --ink:#141E2B; --sub:#6E8BA3;
  --bg:#F7F3EC; --card:#fff; --line:#E4DDCE; --good:#16a34a; --gold:#f59e0b; --bad:#dc2626;
  --shadow:none; --wrap:680px;
}
@media (prefers-color-scheme:dark){:root{
  --bg:#141E2B; --card:#1B2838; --ink:#EEF3F6; --sub:#B9C6D2; --line:#2A3A4E;
  --shadow:none;}}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{overflow-x:hidden;max-width:100%}
body{margin:0;font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
.wrap{max-width:var(--wrap);margin:0 auto;padding:16px 15px 40px}
.rl-appbar{position:sticky;top:0;z-index:20}
.rl-appbar .rl-glyph{width:30px;height:30px}
.rl-appbar .rl-mark{background:rgba(238,243,246,.10)}
.pull{margin-top:0}
.exam{background:var(--card);border-radius:18px;box-shadow:var(--shadow);padding:16px 18px;display:flex;align-items:center;gap:14px}
.exam .d{font-size:2.4rem;font-weight:900;line-height:1;color:var(--accent);font-variant-numeric:tabular-nums}
.exam .l{flex:1;min-width:0}.exam .l b{font-size:.95rem}.exam .l small{display:block;color:var(--sub);font-size:.74rem;margin-top:2px}
.exam input{border:1.5px solid var(--line);border-radius:10px;padding:8px 10px;background:var(--card);color:var(--ink);font:inherit;min-width:0;max-width:210px}
.exam .d{flex:0 0 auto}
.exam button{border:0;background:var(--accent);color:#fff;border-radius:10px;padding:9px 12px;font-weight:800;cursor:pointer;font:inherit}
.stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:11px;margin:16px 0}
.stat{background:var(--card);border-radius:16px;padding:14px 6px;text-align:center;box-shadow:var(--shadow);min-width:0}
.stat b{display:block;font-size:1.6rem;font-weight:900;color:var(--accent);line-height:1.1}
.stat span{font-size:.72rem;color:var(--sub)}
.sect{font-size:.82rem;font-weight:800;color:var(--sub);margin:20px 4px 10px;letter-spacing:.5px}
.card{display:block;text-decoration:none;color:inherit;background:var(--card);border-radius:20px;
  box-shadow:var(--shadow);padding:16px 17px;margin-bottom:14px;border:1px solid var(--line);
  position:relative;overflow:hidden;transition:transform .12s}
.card:active{transform:scale(.985)}
.card .bar-top{position:absolute;left:0;top:0;height:5px;width:100%}
.card .hd{display:flex;align-items:center;gap:13px;margin-bottom:12px}
.card .emoji{flex:0 0 auto;font-size:32px;width:52px;height:52px;border-radius:15px;display:grid;place-items:center;color:#fff}
.card .nm{flex:1;min-width:0}
.card .nm b{font-size:1.12rem;font-weight:900}
.card .nm small{display:block;color:var(--sub);font-size:.76rem;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .go{flex:0 0 auto;font-size:.8rem;font-weight:800;padding:7px 13px;border-radius:20px;color:#fff}
.prog{height:9px;border-radius:99px;background:var(--line);overflow:hidden;margin:4px 0 8px}
.prog i{display:block;height:100%;border-radius:99px;transition:width .5s}
.row{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;font-size:.78rem;color:var(--sub);font-weight:600}
.row .hi{color:var(--ink);font-weight:800}
.badge{display:inline-block;font-size:.68rem;font-weight:800;padding:2px 8px;border-radius:20px;margin-left:6px}
.foot{text-align:center;color:var(--sub);font-size:.72rem;margin-top:22px;line-height:1.7}
.tip{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:12px 15px;font-size:.8rem;color:var(--sub);line-height:1.7;margin-top:4px}
.tip b{color:var(--ink)}
</style>
<body class="theme-pine">

<header class="rl-appbar">
  <span class="rl-mark"><svg class="rl-glyph" width="26" height="26" viewBox="0 0 64 64" fill="none" stroke-linejoin="round" stroke-linecap="round" stroke-width="3.6"><path class="ridge" stroke="currentColor" d="M4 54 L14 52 L22 50 L30 48 L44 14 L58 46"/><path d="M39 24 L44 14 L47 19" stroke="#DE9A45"/></svg></span>
  <div>
    <div class="rl-title">學測自然複習</div>
    <div class="rl-sub">生物・地球科學・分科生物　官方歷屆題庫</div>
  </div>
  <span class="rl-spacer"></span>
</header>

<div class="wrap">
  <div class="pull"></div>
  <div class="exam" id="exam"></div>

  <div class="stats" id="stats"></div>

  <div class="sect">📚 題庫 App（點卡片開始練習）</div>
  <div id="cards"></div>

  <div class="sect">💡 使用說明</div>
  <div class="tip">
    <b>三支 App 各自獨立</b>，進度分開記錄、離線可用、可各自「加到主畫面」。<br>
    在此設定<b>學測日期</b>會同步到三支 App 的倒數。學測考生物與地科（學測自然）；<b>分科生物</b>範圍更廣（選修生物Ⅰ–Ⅳ），作為進階加深練習。
  </div>

  <div class="foot" id="foot"></div>

  <footer class="rl-signature">
    <div class="rl-sig-row">
      <svg viewBox="0 0 64 64" class="rl-sig-glyph" width="60" height="60" fill="none" stroke-linejoin="round" stroke-linecap="round" stroke-width="3.6"><path class="ridge" stroke="currentColor" d="M0 54 L8 48 L14 51 L22 38 L26 42 L36 14 L46 34 L61 44"/><path d="M31.3 27.2 L36 14 L38.7 19.4" stroke="#DE9A45"/></svg>
      <span class="rl-sig-rule"></span>
      <p class="rl-sig-quote">人生走稜，<br>高低都是風景。</p>
    </div>
    <p class="rl-sig-by">LUCAS 出品</p>
  </footer>
</div>

<script>
const HUBKEY='natsci_hub_v1';
const APPS=[
 {key:'biogsat_qb_v1',name:'學測生物',sub:'細胞・遺傳・演化（學測自然）',emoji:'🧬',c:'#059669',c2:'#10b981',path:'biology/index.html',tot:71,all:78},
 {key:'escgsat_qb_v1',name:'學測地科',sub:'天文・大氣・海洋・地質・永續',emoji:'🌏',c:'#0284c7',c2:'#38bdf8',path:'earth/index.html',tot:62,all:70},
 {key:'fenke_qb_v1',name:'分科生物',sub:'選修生物Ⅰ–Ⅳ · 進階加深',emoji:'🧪',c:'#7c3aed',c2:'#a78bfa',path:'advanced-bio/index.html',tot:116,all:146},
];
function readS(key){try{return JSON.parse(localStorage.getItem(key)||'{}')||{}}catch(e){return{}}}
function stat(key){const S=readS(key);const rec=S.rec||{};const done=Object.keys(rec).length;
  const corr=Object.values(rec).filter(x=>x&&x.correct).length;
  return{done,corr,wrong:(S.wrong||[]).length,fav:(S.fav||[]).length,exam:((S.settings||{}).examDate)||''};}
function pct(a,b){return b?Math.round(a/b*100):0}
function esc(s){return(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

function examDate(){
  // 優先 hub 自己的；否則抓任一 App 有設的
  let d=(readS(HUBKEY).examDate)||'';
  if(!d){for(const a of APPS){const e=stat(a.key).exam;if(e){d=e;break;}}}
  return d;
}
function setExam(v){
  const h=readS(HUBKEY);h.examDate=v;try{localStorage.setItem(HUBKEY,JSON.stringify(h))}catch(e){}
  // 同步到三支 App
  APPS.forEach(a=>{const S=readS(a.key);S.settings=S.settings||{dark:'auto',immediate:true};S.settings.examDate=v;
    try{localStorage.setItem(a.key,JSON.stringify(S))}catch(e){}});
  render();
}
function dayDiff(a,b){return Math.round((new Date(b)-new Date(a))/86400000)}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}

function render(){
  const dt=examDate();
  let cd=dt?dayDiff(todayStr(),dt):null;
  document.getElementById('exam').innerHTML = cd!=null
   ? `<div class="d">${cd>0?cd:cd===0?'0':'✓'}</div>
      <div class="l"><b>${cd>0?`距離學測還有 ${cd} 天`:cd===0?'今天就是學測！加油':`學測已過 ${-cd} 天`}</b>
        <small>${esc(dt)}　點日期可修改（三支 App 同步）</small>
        <input type="date" value="${esc(dt)}" onchange="setExam(this.value)" style="margin-top:6px;width:100%"></div>`
   : `<div class="d">📅</div><div class="l"><b>設定學測日期</b><small>設定後首頁顯示倒數，並同步到三支 App</small>
        <input type="date" onchange="setExam(this.value)" style="margin-top:6px;width:100%"></div>`;

  // 總覽
  let done=0,corr=0,wrong=0;
  APPS.forEach(a=>{const s=stat(a.key);done+=s.done;corr+=s.corr;wrong+=s.wrong;});
  document.getElementById('stats').innerHTML=`
    <div class="stat"><b>${done}</b><span>累計已練</span></div>
    <div class="stat"><b>${pct(corr,done)}%</b><span>總答對率</span></div>
    <div class="stat"><b>${wrong}</b><span>待清錯題</span></div>`;

  // 卡片
  document.getElementById('cards').innerHTML=APPS.map(a=>{
    const s=stat(a.key);const p=pct(s.done,a.tot);
    const acc=s.done?pct(s.corr,s.done):0;
    const accBadge=s.done?`<span class="badge" style="background:${acc>=80?'#dcfce7':acc>=60?'#fef3c7':'#fee2e2'};color:${acc>=80?'#16a34a':acc>=60?'#b45309':'#dc2626'}">答對率 ${acc}%</span>`:'';
    return `<a class="card" href="${a.path}">
      <div class="bar-top" style="background:${a.c}"></div>
      <div class="hd">
        <div class="emoji" style="background:${a.c}">${a.emoji}</div>
        <div class="nm"><b>${a.name}</b><small>${esc(a.sub)}　·　${a.all} 題</small></div>
        <div class="go" style="background:${a.c}">開始 ›</div>
      </div>
      <div class="prog"><i style="width:${p}%;background:${a.c}"></i></div>
      <div class="row"><span>已練 <span class="hi">${s.done}</span> / ${a.tot} 題（${p}%）${accBadge}</span>
        <span>${s.wrong?`錯題 <span class="hi" style="color:var(--bad)">${s.wrong}</span>`:'錯題 0'}</span></div>
    </a>`;
  }).join('');

  document.getElementById('foot').innerHTML=`題目為大考中心官方公開試題（學測111–115／分科112–114），詳解引自翰林精彩解析。<br>離線可用 · 進度存於本機瀏覽器 · 僅供教學與自學練習`;
}
render();
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>

<!-- 版本更新提示（家族共用模組 fam-update v1）-->
<script>
(function(){
  if(!('serviceWorker' in navigator)||window.__famUpd)return; window.__famUpd=1;
  var reg=null, shown=false, refreshing=false, watched=false;
  function mkBanner(){
    if(document.getElementById('famUpdateBanner'))return;
    var b=document.createElement('div'); b.id='famUpdateBanner';
    b.setAttribute('style','position:fixed;left:12px;right:12px;bottom:calc(16px + env(safe-area-inset-bottom,0px));z-index:2147483000;max-width:520px;margin:0 auto;background:linear-gradient(135deg,#16a34a,#0d9488);color:#fff;border-radius:14px;padding:12px 14px;box-shadow:0 8px 26px rgba(16,163,74,.45);display:flex;align-items:center;gap:10px;font:600 14px/1.4 system-ui,-apple-system,"Noto Sans TC","Microsoft JhengHei",sans-serif');
    b.innerHTML='<div style="flex:1"><b>🎉 有新版本可用</b><br><span style="font-size:12.5px;font-weight:400;opacity:.95">點「立即更新」套用最新版</span></div><button id="famUpdGo" style="background:#fff;color:#0d9488;border:0;border-radius:10px;padding:8px 15px;font:800 13.5px system-ui,sans-serif;cursor:pointer">立即更新</button><button id="famUpdX" aria-label="close" style="background:rgba(255,255,255,.22);border:0;color:#fff;width:30px;height:30px;border-radius:8px;font-size:15px;cursor:pointer">✕</button>';
    (document.body||document.documentElement).appendChild(b);
    document.getElementById('famUpdX').onclick=function(){b.remove()};
    document.getElementById('famUpdGo').onclick=function(){
      var w=reg&&reg.waiting;
      if(w){['SKIP_WAITING','skipWaiting',{type:'SKIP_WAITING'}].forEach(function(m){try{w.postMessage(m)}catch(e){}});b.remove();setTimeout(function(){if(!refreshing){refreshing=true;location.reload();}},1800);}
      else location.reload();
    };
  }
  function show(){if(shown)return;shown=true;mkBanner();}
  function watch(r){
    if(!r||watched)return; watched=true; reg=r;
    if(r.waiting&&navigator.serviceWorker.controller)show();
    r.addEventListener('updatefound',function(){var nw=r.installing;if(!nw)return;
      nw.addEventListener('statechange',function(){if(nw.state==='installed'&&navigator.serviceWorker.controller)show();});});
    try{setInterval(function(){r.update().catch(function(){});},30*60*1000);}catch(e){}
  }
  navigator.serviceWorker.getRegistration().then(watch).catch(function(){});
  navigator.serviceWorker.ready.then(watch).catch(function(){});
  navigator.serviceWorker.addEventListener('controllerchange',function(){if(refreshing)return;refreshing=true;location.reload();});
})();
</script>
