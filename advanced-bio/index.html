<title>分科生物題庫 · 官方歷屆</title>
<style>
:root{
  /* 稜線識別 · theme-pine（松綠）— 主色松綠、紙背＋岩藍墨；狀態色（綠/紅/琥珀）保留語意 */
  --accent:#3EA47E; --accent2:#2E8C6A; --soft:#E2F0EA; --ink:#141E2B; --sub:#6E8BA3;
  --bg:#F7F3EC; --card:#fff; --line:#E4DDCE; --good:#16a34a; --goodbg:#dcfce7;
  --bad:#dc2626; --badbg:#fee2e2; --gold:#f59e0b; --shadow:none;
  --wrap:640px; --nav:62px;
}
@media (prefers-color-scheme:dark){:root:not([data-theme=light]){
  --bg:#141E2B; --card:#1B2838; --ink:#EEF3F6; --sub:#8FA6BC; --line:#2A3A4E;
  --soft:#22303F; --goodbg:#123024; --badbg:#3a1620; --shadow:none;}}
:root[data-theme=dark]{--bg:#141E2B;--card:#1B2838;--ink:#EEF3F6;--sub:#8FA6BC;--line:#2A3A4E;--soft:#22303F;--goodbg:#123024;--badbg:#3a1620;--shadow:none;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
.wrap{max-width:var(--wrap);margin:0 auto;padding:14px 14px calc(var(--nav) + 20px)}
.rl-appbar{position:sticky;top:0;z-index:30;padding-top:calc(env(safe-area-inset-top,0px) + 14px)}
.rl-signature{padding-bottom:calc(32px + env(safe-area-inset-bottom,0px) + var(--nav) + 20px)}
.iconbtn{width:36px;height:36px;border-radius:10px;background:color-mix(in srgb,var(--on) 16%,transparent);display:grid;place-items:center;font-size:17px;border:0;color:var(--on);cursor:pointer}
#v-run .iconbtn{background:var(--soft);color:var(--sub)}
#v-run .iconbtn.faved{background:var(--gold);color:#fff}
.cd{display:flex;align-items:center;gap:13px;background:var(--accent);color:#fff;border-radius:16px;padding:14px 16px;margin:14px 0 4px;cursor:pointer;box-shadow:var(--shadow)}
.cd.past{background:var(--muted,#6E8BA3)}
.cd .cdi{font-size:26px}
.cd b{font-size:1rem}.cd small{display:block;opacity:.9;font-size:.72rem;margin-top:2px}
.mode.daily{background:var(--accent);color:#fff;border:0}
.mode.daily .md{color:rgba(255,255,255,.9)}
.mode.daily.ok{background:var(--goodbg);color:var(--good)}
.mode.daily.ok .md{color:var(--good);opacity:.85}
.hidden{display:none!important}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0}
.stat{background:var(--card);border-radius:16px;padding:14px 8px;text-align:center;box-shadow:var(--shadow)}
.stat b{display:block;font-size:1.5rem;font-weight:800;color:var(--accent);line-height:1.1}
.stat span{font-size:.74rem;color:var(--sub)}
.sect{font-size:.82rem;font-weight:800;color:var(--sub);margin:18px 4px 8px;letter-spacing:.5px}
.modes{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mode{background:var(--card);border-radius:18px;padding:16px;box-shadow:var(--shadow);cursor:pointer;border:1px solid var(--line);text-align:left;color:inherit;font:inherit}
.mode .mi{font-size:26px}
.mode .mt{font-weight:800;margin-top:6px;font-size:1rem}
.mode .md{font-size:.72rem;color:var(--sub);margin-top:2px}
.mode.wide{grid-column:1/-1;width:100%;display:flex;align-items:center;gap:14px}
.modes .mode:last-child:nth-child(odd){grid-column:1/-1}
@media (min-width:820px){:root{--wrap:880px}.modes{grid-template-columns:repeat(3,1fr)}}
.mode.wide .mi{font-size:30px}
.mode.wide .mt{margin-top:0}
.chip{display:inline-flex;align-items:center;gap:5px;background:var(--soft);color:var(--accent);border-radius:20px;padding:4px 11px;font-size:.72rem;font-weight:700}
.picker{display:flex;flex-wrap:wrap;gap:10px;margin:10px 0}
.pbtn{flex:1;min-width:90px;background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:14px 10px;font-weight:800;cursor:pointer;color:var(--ink);font:inherit;text-align:center;box-shadow:var(--shadow)}
.pbtn small{display:block;font-size:.72rem;color:var(--sub);font-weight:600;margin-top:3px}
.pbtn.on{border-color:var(--accent);background:var(--soft);color:var(--accent)}
.back{display:inline-flex;align-items:center;gap:5px;color:var(--accent);font-weight:700;font-size:.9rem;background:none;border:0;cursor:pointer;padding:6px 0;margin-bottom:4px}
.qhead{display:flex;align-items:center;gap:10px;margin:6px 0 12px}
.qhead .prog{flex:1;height:8px;border-radius:99px;background:var(--line);overflow:hidden}
.qhead .prog i{display:block;height:100%;background:var(--accent);transition:width .3s}
.qhead .cnt{font-size:.8rem;font-weight:800;color:var(--sub)}
.timer{font-size:.8rem;font-weight:800;color:var(--accent);background:var(--soft);padding:4px 10px;border-radius:20px;font-variant-numeric:tabular-nums}
.tag{display:inline-block;font-size:.72rem;font-weight:800;color:var(--accent);background:var(--soft);border-radius:7px;padding:2px 8px;margin-right:6px}
.tag.multi{color:#2E8C6A;background:#E2F0EA}
.tag.diff{color:var(--gold);background:#fef3c7}
.tag.cross{color:#0891b2;background:#cffafe}
:root[data-theme=dark] .tag.multi{background:#173529}:root[data-theme=dark] .tag.diff{background:#3a2e10}:root[data-theme=dark] .tag.cross{background:#0a2a30}
.stem{font-size:1.02rem;font-weight:600;margin:6px 0 12px;line-height:1.6}
.passage{background:var(--soft);border-radius:14px;padding:12px 15px;font-size:.9rem;line-height:1.75;white-space:pre-wrap;margin-bottom:12px;border-left:4px solid var(--accent2)}
.passage .pg{font-size:.7rem;color:var(--sub);font-weight:800;margin-bottom:4px;letter-spacing:.4px}
.qimg{width:100%;border-radius:12px;border:1px solid var(--line);margin:4px 0 12px;background:#fff}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{display:flex;gap:11px;align-items:flex-start;background:var(--card);border:1.5px solid var(--line);border-radius:13px;padding:13px 14px;cursor:pointer;text-align:left;font:inherit;color:inherit;transition:.12s}
.opt .k{flex:0 0 26px;height:26px;border-radius:8px;background:var(--soft);color:var(--accent);font-weight:800;display:grid;place-items:center;font-size:.86rem}
.opt .v{flex:1;font-size:.95rem;padding-top:1px}
.opt.sel{border-color:var(--accent);background:var(--soft)}
.opt.sel .k{background:var(--accent);color:#fff}
.opt.correct{border-color:var(--good);background:var(--goodbg)}
.opt.correct .k{background:var(--good);color:#fff}
.opt.wrong{border-color:var(--bad);background:var(--badbg)}
.opt.wrong .k{background:var(--bad);color:#fff}
.opt[disabled]{cursor:default}
.hint{font-size:.76rem;color:var(--sub);margin:2px 0 8px}
.confirm{width:100%;padding:13px;border-radius:13px;font-weight:800;font-size:.98rem;border:0;cursor:pointer;background:var(--accent);color:#fff;margin-top:12px;box-shadow:var(--shadow)}
.confirm:disabled{opacity:.4}
.fb{margin-top:12px;border-radius:12px;padding:11px 14px;font-weight:700;font-size:.9rem}
.fb.ok{background:var(--goodbg);color:var(--good)}
.fb.no{background:var(--badbg);color:var(--bad)}
.expl{margin-top:10px;background:var(--soft);border-left:4px solid var(--accent2);border-radius:10px;padding:11px 14px;font-size:.9rem;line-height:1.75;color:var(--ink);white-space:pre-wrap}
.rev-item .expl{margin-top:8px;font-size:.84rem}
.nc-item{border-bottom:1px solid var(--line);padding:12px 0}.nc-item:last-child{border:0}
.ncq{font-size:.98rem;font-weight:600;line-height:1.6}
details{margin-top:6px}
details summary{cursor:pointer;color:var(--accent);font-weight:700;font-size:.85rem;list-style:none}
details summary::-webkit-details-marker{display:none}
details summary::before{content:'▸ '}details[open] summary::before{content:'▾ '}
.ncref{margin-top:8px;background:var(--soft);border-radius:10px;padding:10px 12px;font-size:.9rem;line-height:1.7;white-space:pre-wrap}
.foot{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top:1px solid var(--line);
  padding:10px 14px calc(10px + env(safe-area-inset-bottom));display:flex;gap:10px;justify-content:center;z-index:20}
.foot .in{max-width:var(--wrap);width:100%;margin:0 auto;display:flex;gap:10px}
.btn{flex:1;padding:14px;border-radius:14px;font-weight:800;font-size:1rem;border:0;cursor:pointer;background:var(--accent);color:#fff;box-shadow:var(--shadow)}
.btn.ghost{background:var(--card);color:var(--ink);border:1.5px solid var(--line);box-shadow:none}
.btn:disabled{opacity:.45}
.result .big{text-align:center;padding:20px 0}
.result .score{font-size:3.2rem;font-weight:900;color:var(--accent);line-height:1}
.bar{margin:10px 0}
.bar .lb{display:flex;justify-content:space-between;font-size:.82rem;font-weight:700;margin-bottom:4px}
.bar .track{height:12px;border-radius:99px;background:var(--line);overflow:hidden}
.bar .track i{display:block;height:100%;border-radius:99px}
.card{background:var(--card);border-radius:16px;padding:16px;box-shadow:var(--shadow);margin-bottom:12px}
.nav{position:fixed;left:0;right:0;bottom:0;z-index:25;background:var(--card);border-top:1px solid var(--line);
  display:flex;padding-bottom:env(safe-area-inset-bottom)}
.nav button{flex:1;background:none;border:0;padding:8px 0 7px;font-size:.66rem;color:var(--sub);cursor:pointer;font-weight:700}
.nav button .ni{display:block;font-size:19px;margin-bottom:1px}
.nav button.on{color:var(--accent)}
.empty{text-align:center;color:var(--sub);padding:40px 20px;font-size:.9rem}
.rev-item{border-left:4px solid var(--bad);padding:10px 12px;background:var(--card);border-radius:10px;margin-bottom:10px;box-shadow:var(--shadow)}
.rev-item .q{font-size:.9rem;font-weight:600}
.rev-item .a{font-size:.82rem;margin-top:6px}
.rev-item .a b{color:var(--good)}.rev-item .a s{color:var(--bad)}
.revhd{font-weight:800;font-size:.84rem;margin:16px 2px 9px;padding:7px 12px;border-radius:9px}
.revhd.bad{color:var(--bad);background:var(--badbg)}.revhd.ok{color:var(--good);background:var(--goodbg)}
.rev-item.ok{border-left-color:var(--good)}
.rev-item.ok>summary{list-style:none;cursor:pointer;font-size:.9rem;font-weight:600;color:var(--ink)}
.rev-item.ok>summary::-webkit-details-marker{display:none}
.rev-item.ok>summary::before{content:'▸ ';color:var(--good);font-weight:800}
.rev-item.ok[open]>summary::before{content:'▾ ';color:var(--good)}
.switch{width:46px;height:27px;border-radius:99px;background:var(--line);position:relative;cursor:pointer;flex:0 0 auto}
.switch.on{background:var(--accent)}
.switch i{position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:.2s}
.switch.on i{left:22px}
.setrow{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
.setrow .l{flex:1}.setrow .l small{display:block;font-size:.72rem;color:var(--sub)}
</style>

<script>
const QB = {"meta": {"title": "分科測驗生物題庫", "subject": "分科生物", "source": "大考中心 分科測驗生物 官方公開試題（112–114）＋翰林分科精彩解析", "years": [114, 113, 112], "chapters": ["生物(全) 基礎", "選Ⅰ 細胞與遺傳", "選Ⅱ 植物", "選Ⅲ 動物構造與生理", "選Ⅳ 生態與演化"], "total": 146, "usable": 116}, "reading": [{"id": "F112-1", "year": 112, "no": 1, "ch": "選Ⅲ 動物構造與生理", "chn": 3, "topic": "內分泌激素的功能、負回饋和拮抗等機制的運用", "diff": "中", "section": "分科", "kind": "single", "stem": "某生將實驗動物進行甲狀腺切除手術，10 天後分析其血清中激素含量，下列敘述何者正確？", "options": {"A": "降鈣素升高", "B": "促甲狀腺素釋放激素升高", "C": "促甲狀腺素不變", "D": "副甲狀腺素不變"}, "answer": ["B"], "expl": "甲狀腺可分泌甲狀腺素、降鈣素。 (A) 甲狀腺被切除後，降鈣素分泌來源被切斷，\n因此降鈣素含量應下降。 (B) (C) 甲狀腺素的分泌來源被切斷，甲狀腺素含量下降，\n會啟動下視丘-腦垂腺-甲狀腺的負回饋機制，由下視丘分泌促甲狀腺素釋放激素\n刺激腦垂腺，再由腦垂腺分泌促甲狀腺素，嘗試刺激甲狀腺分泌甲狀腺素，故\n促甲狀腺素含量應提升。 (D) 副甲狀腺包埋於甲狀腺內部，很可能在移除甲狀腺\n時也一起被移除，導致副甲狀腺素也減少。", "cross": false}, {"id": "F112-2", "year": 112, "no": 2, "ch": "選Ⅳ 生態與演化", "chn": 4, "topic": "學生能熟習並理解影響演化的因素", "diff": "中", "section": "分科", "kind": "multi", "stem": "下列哪些因素傾向改變族群等位基因的頻率？", "options": {"A": "族群沒有遷入與遷出的個體", "B": "族群中的雌、雄個體隨機配對", "C": "沒有定向或分裂天擇，有利於中間表型", "D": "不受天擇篩選之中性突變", "E": "環境擾動隨機移除族群內個體"}, "answer": ["C", "D", "E"], "expl": "等位基因的頻率發生改變，代表此族群在進行演化中，天擇、突變、遺傳漂變、\n基因流動和非隨機交配都是可能原因。 (A) 沒有遷入、遷出，代表「沒有基因流\n動」。 (B) 族群內進行「隨機交配」。 (C) 沒有定向或分裂天擇，但有利於中間表\n型，代表存在著「穩定型天擇」。 (D) 存在中性「突變」。 (E) 環境擾動移除族群內\n個體，應為「遺傳漂變」中的「瓶頸效應」。", "cross": false}, {"id": "F112-3", "year": 112, "no": 3, "ch": "選Ⅳ 生態與演化", "chn": 4, "topic": "學生能熟習並理解各種演化理論的內容", "diff": "中", "section": "分科", "kind": "multi", "stem": "從達爾文的物種原始到現代綜合論與中性理論，演化的概念與機制不斷被深化甚至挑戰， 下列敘述哪些正確？", "options": {"A": "功能基因的 DNA 鹼基突變時，必會影響轉譯出的蛋白質的功能，因而受天擇篩選", "B": "中性突變不影響生物演化", "C": "現代綜合論與中性理論所認為的演化主要動力不同", "D": "表型與 DNA 序列變化都會被天擇所篩選", "E": "族群中等位基因頻度隨世代改變即為演化"}, "answer": ["C", "E"], "expl": "(A) 功能基因的 DNA 鹼基突變若為靜默突變（silent mutation），不會改變胺基\n酸種類，也不影響轉譯出的蛋白質功能。 (B) 中性突變也可能因遺傳漂變等隨機\n事件發生，使等位基因的頻率發生改變、影響演化。 (C) 現代綜合論認為演化為\n遺傳變異經天擇篩選的結果；中性理論則認為突變大多為中性，由隨機事件影\n響等位基因的頻率。 (D) DNA 序列的變化若為中性突變，可能不會受到天擇作\n用。 (E) 等位基因頻度隨世代變化，即代表此族群發生演化。", "cross": false}, {"id": "F112-4", "year": 112, "no": 4, "ch": "選Ⅱ 植物", "chn": 2, "topic": "學生能熟習菌根的構造", "diff": "中", "section": "分科", "kind": "single", "stem": "下列有關植物共生性菌根的敘述，何者正確？", "options": {"A": "菌根是植物根部與細菌的共生構造", "B": "共生菌可提供植物生存所需的醣類等養分", "C": "共生菌可增加植物根部的表面積，以增加水分及礦物質的吸收", "D": "所有共生菌都會在植物根部形成外鞘"}, "answer": ["C"], "expl": "(A) 菌根為植物根部與「真菌」的共生構造。 (B) (C) 共生菌增加植物根部表面積，\n提升無機鹽類（礦物質）和水分的吸收。 (D) 僅外生菌根會形成菌鞘。", "cross": false}, {"id": "F112-5", "year": 112, "no": 5, "ch": "選Ⅲ 動物構造與生理", "chn": 3, "topic": "學生能熟習生殖相關內分泌激素功能、正回饋機制", "diff": "中", "section": "分科", "kind": "multi", "stem": "嬰兒正在吸吮母乳時，除了刺激乳腺泌乳外，正在哺乳的媽媽有時會感受到子宮收縮。下 列有關吸吮動作造成上述現象的敘述，哪些正確？", "options": {"A": "乳頭的感覺受器受刺激後，直接經由神經傳導引起子宮收縮", "B": "腦垂腺前葉釋放催乳素，促進乳汁分泌", "C": "腦垂腺前葉釋放濾泡刺激素，引起子宮收縮", "D": "腦垂腺後葉釋放催產素，引起子宮收縮", "E": "腦垂腺前葉釋放黃體成長激素，刺激黃體素分泌造成子宮收縮 8"}, "answer": ["B", "D"], "expl": "(A) (D) 乳頭的感覺受器接受刺激後，引起腦垂腺後葉釋放催產素，經血液循環影\n響子宮收縮。 (B) 腦垂腺前葉可釋放催乳素，促進乳腺發育製造乳汁。 (C) 腦垂腺\n前葉釋放濾泡刺激素（FSH），刺激濾泡成熟和子宮內膜增生，不引起子宮收\n縮。 (E) 腦垂腺前葉釋放黃體成長激素（LH），刺激黃體素分泌、穩定子宮內膜，\n不引起子宮收縮。", "cross": false}, {"id": "F112-6", "year": 112, "no": 6, "ch": "選Ⅰ 細胞與遺傳", "chn": 1, "topic": "學生能熟習生物體組成分子的結構、生合成過程", "diff": "中", "section": "分科", "kind": "multi", "stem": "由單醣、胺基酸、核苷酸合成為多醣、蛋白質與核酸的過程中有哪些共同點？", "options": {"A": "為脫水反應", "B": "在細胞質內進行", "C": "需要酵素參與", "D": "為耗能反應", "E": "主要在細胞分裂時進行"}, "answer": ["A", "C", "D"], "expl": "(A) (C) (D) 單醣、胺基酸、核苷酸為單體，多醣、蛋白質與核酸為聚合物。由單體\n組成聚合物的過程為脫水縮合的耗能同化代謝反應，需要酵素參與降低活化能、\n增快反應速度。 (B) 單醣、胺基酸合成多醣和蛋白質在細胞質內進行，但核酸的\n合成可以在細胞核內（真核生物的 DNA）及細胞質內（原核生物的 DNA、所有\n生物的 RNA）發生。 (E) 三者的合成可在細胞需要時進行，不限於細胞分裂時。", "cross": false}, {"id": "F112-7", "year": 112, "no": 7, "ch": "選Ⅱ 植物", "chn": 2, "topic": "學生能熟習植物體的構造", "diff": "中", "section": "分科", "kind": "single", "stem": "下列有關植物器官的敘述，何者正確？", "options": {"A": "僅塊根能儲存養分，其他種類的根不行", "B": "蘿蔔的塊莖儲藏養分", "C": "仙人掌肉質莖只具有儲藏養分的功能", "D": "蓮藕是屬於莖的一種，可儲藏養分"}, "answer": ["D"], "expl": "(A) 能儲存養分的根為儲藏根，如塊根（如地瓜）、球根（如百合、鬱金香）等。\n (B) 蘿蔔的「塊根」儲藏養分。 (C) 仙人掌的肉質莖具有儲藏養分和水分的功能。", "cross": false}, {"id": "F112-8", "year": 112, "no": 8, "ch": "選Ⅰ 細胞與遺傳", "chn": 1, "topic": "圖表判讀。學生能經由題幹了解電泳膠體內集中帶粗細的意義，再根據蛋白質", "diff": "中", "section": "分科", "kind": "single", "stem": "感染病毒會造成細胞 DNA 損傷，蛋白質 X 的表現量會因 DNA 損傷而增加。西方墨點 法是偵測特定蛋白質表現量的工具，此方法 需先將細胞的蛋白質以膠體電泳分離後，再 用特定蛋白質的抗體去識別該特定蛋白質在 電泳膠體中的集中帶，集中帶愈粗即表示該特定蛋白質表現量愈高。某生收集如表 1 所列 之第一組～第三組的細胞蛋白質萃取液，在相同條件之下以蛋白質 X 的抗體進行西方墨點 法分析，結果皆偵測到蛋白質 X 的訊號。下列何種訊號與預期結果較為符合？", "options": {"D": "表 1 一 二 三 病毒感染 無 有 有 添加物 無 無 DNA 損傷修復劑"}, "answer": ["B"], "expl": "題幹提到病毒會造成 DNA 損傷，而蛋白質 X 的表現量會因 DNA 損傷而增加。\n故有病毒感染的「二、三組」在電泳膠體中的集中帶應較未有病毒感染的「一\n組」來得粗；「三組」額外增加了 DNA 損傷修復劑，預期可降低病毒造成的 \nDNA 損傷，故蛋白質 X 的表現量應比「二組」少、集中帶較細。因此集中帶\n由粗至細：二＞三＞一，故選 (B) 。", "cross": false}, {"id": "F112-9", "year": 112, "no": 9, "ch": "選Ⅰ 細胞與遺傳", "chn": 1, "topic": "學生能判斷應以何種演化的證據進行親緣關係的比較", "diff": "易", "section": "分科", "kind": "single", "stem": "若科學家認為已滅絕的大地獺與現生樹獺外形相似，而想以 現代科學方法證明這兩物種有共同祖先，則下列何者為最適 合的方法？", "options": {"A": "進行細胞培養觀察細胞型態的相似度", "B": "以 PCR 擴增其 DNA 後比較相關 DNA 序列相似度", "C": "萃取 DNA 後比較相關 DNA 長度相似度", "D": "檢測骨頭主要組成成分的相似度"}, "answer": ["B"], "expl": "(A) 細胞型態可能因組織部位不同而差異甚多，不適合作為比較兩物種的依據。\n (B) (C) 即使 DNA 長度相同，但序列不同，最終表現的蛋白質可能就相差甚大，\n故應以序列相似度為比較依據；化石上的 DNA 可能殘缺或相當稀少，以 PCR \n技術增加樣本量後更有利比較。 (D) 骨頭的主要組成成分在多數具有骨骼的生物\n中可能都十分相近，不適合進行比較。", "cross": false}, {"id": "F112-10", "year": 112, "no": 10, "ch": "選Ⅳ 生態與演化", "chn": 4, "topic": "學生能了解學名的組成", "diff": "易", "section": "分科", "kind": "single", "stem": "下列對於 Mylodon darwinii 命名法的敘述，何者正確？", "options": {"A": "是依發現者名字作為俗名的命名", "B": "是以通用英文所進行的命名", "C": "是依達爾文演化論進行命名", "D": "是以林奈之二名法進行命名"}, "answer": ["D"], "expl": "此物種的命名為林奈二名法的學名（斜體、屬名＋種小名、拉丁文），其中種\n小名為達爾文的姓氏拉丁化，並非發現者的名字。", "cross": false}, {"id": "F112-11", "year": 112, "no": 11, "ch": "選Ⅰ 細胞與遺傳", "chn": 1, "topic": "學生能熟習生物體組成分子的結構、生成與應用", "diff": "中", "section": "分科", "kind": "multi", "stem": "在蛋白質上加上醣鏈會形成醣蛋白，下列對於醣蛋白的敘述哪些正確？", "options": {"A": "所有的生物皆會合成醣蛋白", "B": "真核細胞醣蛋白的合成是在細胞核完成", "C": "真核細胞的細胞膜上具有醣蛋白", "D": "病毒表面的醣蛋白，使其可進入特定宿主細胞", "E": "細菌細胞壁組成之醣蛋白是致病的重要依據"}, "answer": ["C", "D"], "expl": "(A) 部分原核生物細胞不具有醣蛋白。 (B) 醣蛋白的組成為蛋白質上加上醣鏈，蛋\n白質的合成與醣鏈的修飾均在真核生物的細胞質中完成。 (C) 真核細胞的細胞膜\n上有醣蛋白，如 ABO 血型中的 A 抗原和 B 抗原。 (D) 病毒表面的醣蛋白為病毒\n感染特定宿主，具有專一性的依據。 (E) 細菌細胞壁組成為肽聚醣，並非醣蛋白。", "cross": false}, {"id": "F112-12", "year": 112, "no": 12, "ch": "選Ⅰ 細胞與遺傳", "chn": 1, "topic": "學生能熟習遺傳的染色體學說、性聯遺傳、聯鎖和互換等遺傳學理論內容", "diff": "易", "section": "分科", "kind": "multi", "stem": "下列有關染色體與遺傳的敘述，哪些正確？", "options": {"A": "包法利－薩登以實驗數據證明基因位於染色體上", "B": "決定果蠅眼睛顏色之基因位於體染色體上", "C": "摩根的實驗發現性聯遺傳", "D": "不同體色與翅形的果蠅雜交後，F2 子代產生 4 種表型比率為 9：3：3：1 證實基因的連 （聯）鎖", "E": "染色體互換提供了表型的多樣與變化"}, "answer": ["C", "E"], "expl": "(A) 包法利－薩登觀察染色體，推測孟德爾遺傳法則中的因子與其相關，並沒有\n直接提出實驗數據證明基因在染色體上。 (B) 決定果蠅眼色的基因在其 X 染色體\n上（性染色體）。 (C) 摩根透過實驗發現性聯遺傳，也提供遺傳的染色體學說的\n實驗證據。 (D) 若 F2 的 4 種表型比率為 9：3：3：1，基因應為獨立分配。 (E) 染\n色體的互換增加配子等位基因組合的多樣性，提供表型多樣化的來源。", "cross": false}, {"id": "F112-13", "year": 112, "no": 13, "ch": "選Ⅲ 動物構造與生理", "chn": 3, "topic": "學生能熟習神經系統與神經傳遞物的內容", "diff": "易", "section": "分科", "kind": "multi", "stem": "森林內一隻狼（捕食者）凝視著正在吃草的兔子（獵物），並緩慢移動靠近此尚未警覺到 危險的獵物，下列有關捕食者和獵物當下生理狀態的敘述，哪些正確？", "options": {"A": "捕食者體內釋放乙醯膽鹼增強其心肌的收縮", "B": "捕食者運動神經細胞釋放乙醯膽鹼促進骨骼肌收縮", "C": "捕食者交感神經系統活性增加", "D": "獵物消化道的交感神經系統活化中", "E": "獵物消化道的副交感神經系統活化中"}, "answer": ["B", "C", "E"], "expl": "(A) 副交感神經節後神經元會釋放乙醯膽鹼，作用在心肌上會降低心肌收縮。 (B)\n體運動神經在運動終板也釋放乙醯膽鹼，作用在骨骼肌上會促進骨骼肌收縮。\n (C) (D) (E) 交感神經會促進打、逃等緊急快速行為，如捕食者的移動，但也會抑制\n消化道的活動；副交感神經會促進消化道的活動。", "cross": false}, {"id": "F112-14", "year": 112, "no": 14, "ch": "選Ⅰ 細胞與遺傳", "chn": 1, "topic": "學生能熟習轉譯作用的內容", "diff": "中", "section": "分科", "kind": "multi", "stem": "一胜肽鏈的序列為 Met-Phe-Ser-Tyr-Cys-Arg，從胜肽鏈的合成開始到結束，下列哪些分子 會出現在核糖體的 A 位？", "options": {"A": "帶有 Ser 胺基酸的 tRNA", "B": "不帶有胺基酸的 tRNA", "C": "帶有 Gln 胺基酸的 tRNA", "D": "帶有胜肽鏈 Tyr-Cys 的 tRNA", "E": "帶有胜肽鏈 Met-Phe-Ser-Tyr-Cys 的 tRNA"}, "answer": ["A", "E"], "expl": "新的 tRNA 攜帶胺基酸進入核糖體 A 位，其胺基酸接著與 P 位的胜肽鏈結合。\n (B) 不帶有胺基酸的 tRNA 不會進入 A 位。 \n (C) Gln 並非此胜肽鏈的胺基酸之一。 \n (D) tRNA 一次僅會攜帶一個胺基酸進入 A 位。", "cross": false}, {"id": "F112-15", "year": 112, "no": 15, "ch": "選Ⅱ 植物", "chn": 2, "topic": " 息主要活化表現 TrpV4 的感覺神經元，使其產生動作電位"}, "answer": ["C"], "expl": "題圖 3 可見 WT 和 TrpV4-/-\n 兩組的核心體溫都在過敏原注射之後有明顯的下降，\n而 TrpV1-/-\n 的核心體溫在注射過敏原之後仍能維持，可推論：協助過敏性分子\n訊息傳遞的神經元為具有 TrpV1 離子通道的神經元，而非具有 TrpV4 離子通道\n的神經元，故選 (C) 。", "cross": false}, {"id": "F112-28", "year": 112, "no": 28, "ch": "選Ⅲ 動物構造與生理", "chn": 3, "topic": "圖表判讀。學生能經由閱讀了解小鼠的過敏反應症狀，結合學過的免疫學知識", "diff": "中", "section": "分科", "kind": "single", "stem": "科學家發現因 IgE 介導活化的肥大細胞所釋放的凝乳酶，具有活化溫度調節神經迴路的作 用。綜合文章描述下列哪一示意圖較適合本文的結論？（註解：→ 活化；┥降低）", "options": {"A": "凝乳酶→ TrpV1 ＋∕TrpV4 ＋感覺神經元 → 脊髓 → 腦幹 → 溫度調節中樞 → BAT 產熱", "B": "凝乳酶→ TrpV4 ＋感覺神經元 → 脊髓 → 腦幹 → 溫度調節中樞 → BAT 產熱", "C": "凝乳酶→ TrpV1 ＋感覺神經元 → 脊髓 → 腦幹 → 溫度調節中樞 ┥BAT 產熱", "D": "凝乳酶→ TrpV4 ＋感覺神經元 → 脊髓 → 腦幹 → 溫度調節中樞 ┥BAT 產熱 20"}, "answer": ["C"], "expl": "綜合第 26.、27.，IgE∕MCs 的訊息會經由 TrpV1 感覺神經元進行傳遞，而中間\n的橋梁為凝乳酶，故選 (C) 。", "cross": false}, {"id": "F112-29", "year": 112, "no": 29, "ch": "選Ⅲ 動物構造與生理", "chn": 3, "topic": "學生能熟習顯微鏡的操作、顯微測量技術與組織的形態等知識", "diff": "中", "section": "分科", "kind": "multi", "stem": "小瑩在複式顯微鏡下觀察動物組織玻片，視野中觀察到少量細胞散布於大量的細胞外基質 中。下列相關敘述哪些正確？", "options": {"A": "小瑩想把視野右上角的 A 細胞移至視野中央觀察，她應將玻片往左下方移動", "B": "由於視野中細胞數量稀少，若小瑩想看較多的細胞，她應該轉換成較高倍物鏡", "C": "在 10 倍物鏡下 A 細胞的最大直徑約為目鏡測微器的 3 小格長度，若於 40 倍物鏡下則約 為 12 小格長度", "D": "該組織與脂肪、硬骨、軟骨和血液等組織同屬於結締組織", "E": "該組織多分布於口腔黏膜表面，以保護口腔"}, "answer": ["C", "D"], "expl": "(A) 此題使用複式顯微鏡。細胞在視野右上角，實際上在玻片的左下方，故要將\n細胞移至視野正中央，應「將玻片往右上方移動」。 (B) 視野中細胞數量稀少，\n要有更多細胞應切換成更「低倍」的物鏡。 (C) 在 10 倍物鏡下 A 細胞最大直徑\n為 3 小格長，目鏡測微器每一小格的長度設為 a，則此細胞直徑為 3a；在 40 倍\n物鏡下，目鏡測微器每一小格應為4\na ，此時細胞直徑所占格數應為 3a÷ 4\na ＝12\n（格）。 (D) 視野下有少量細胞散布於大量細胞外基質中，符合結締組織的觀察\n型態。 (E) 口腔黏膜表面保護口腔者為表皮組織。", "cross": false}, {"id": "F112-30", "year": 112, "no": 30, "ch": "選Ⅱ 植物", "chn": 2, "topic": "學生能熟習顯微鏡的操作、染劑的種類、功能與顏色變化的意義", "diff": "易", "section": "分科", "kind": "single", "stem": "某生以顯微鏡觀察植物組織細胞，並比較有無加碘液的變化。 圖 4 為一種植物組織切片，左圖為未加碘液，右圖則是加了 碘液後組織片呈藍黑色。根據上述結果該生所觀察的可能為 下列哪一種組織細胞？", "options": {"A": "馬鈴薯塊莖薄壁細胞", "B": "甘藷塊根表皮細胞", "C": "甜菜儲藏根木質部細胞", "D": "甘蔗儲藏莖形成層細胞"}, "answer": ["A"], "expl": "加碘液後整片組織成藍黑色，可推測此植物組織中存在澱粉；選項中具有儲存\n澱粉功能者為馬鈴薯的塊莖（儲存莖）。", "cross": false}, {"id": "F112-31", "year": 112, "no": 31, "ch": "選Ⅲ 動物構造與生理", "chn": 3, "topic": "學生能熟習 ABO 血型中各血型的差異、專一性免疫的抗體與抗原反應，來進", "diff": "中", "section": "分科", "kind": "single", "stem": "測試者 X 和 Y 的血型為何？", "options": {"A": "X 為 AB 型血，Y 為 B 型血", "B": "X 為 AB 型血，Y 為 A 型血", "C": "X 為 O 型血，Y 為 A 型血", "D": "X 為 O 型血，Y 為 B 型血 表 3 抗體 A 抗體 B 測試者 X － － 測試者 Y － ＋"}, "answer": ["D"], "expl": "同類型的抗體會和抗原專一性結合，引發凝集反應。ABO 血型的四種類型所具\n備抗原種類如下： \n血型 \nA 型 \nB 型 \nAB 型 \nO 型 \n抗原種類 \n抗原 A \n抗原 B \n抗原 A 和抗原 B\n不具抗原 A 也不具抗原 B \n測試者 X 在兩種抗體中都沒有凝集，代表不具抗原 A 也不具抗原 B，為 O 型；\n測試者 Y 在抗體 A 中沒有凝集、抗體 B 中有凝集，代表無抗原 A、有抗原 B，\n為 B 型。", "cross": false}, {"id": "F112-32", "year": 112, "no": 32, "ch": "選Ⅲ 動物構造與生理", "chn": 3, "topic": "學生能熟習 ABO 血型中各血型的差異、專一性免疫的抗體與抗原反應，來進", "diff": "中", "section": "分科", "kind": "single", "stem": "將測試者 S 的血漿與測試者 X 和 Y 血液反應，皆無凝集反應。下列何者正確？", "options": {"A": "S 為 B 型或 AB 型", "B": "S 為 A 型或 B 型", "C": "S 為 O 型或 AB 型", "D": "S 為 O 型或 A 型"}, "answer": ["A"], "expl": "承第 31. 題，測試者 S 的血漿無血球、無抗原，僅可能有抗體。今與 X 和 Y 的\n血液反應，以下表紀錄： \n測試者 \n測試者 X 血液（O 型） \n測試者 Y 血液（B 型） \n抗原 A \n抗原 B \n抗原 A \n抗原 B \n抗原種類 \n無 \n無 \n無 \n有 \n測試者 S 血漿 \n（可能有抗體） \n均不凝集 \n由上表可知，測試者 S 的血漿中不具抗體 B，符合此條件的血型可能為 B 型或 \nAB 型。", "cross": false}, {"id": "F112-33", "year": 112, "no": 33, "ch": "選Ⅰ 細胞與遺傳", "chn": 1, "topic": "學生能熟習發酵管與發酵實驗的操作", "diff": "中", "section": "分科", "kind": "single", "stem": "下列對於實驗過程的說明，何者正確？", "options": {"A": "將酵母菌與糖水分別加入此發酵管後，需充分搖晃以讓兩者混合均勻", "B": "混合液體只能加到黑色箭頭標記處，以清楚觀測產氣情況", "C": "發酵進行時，在混合液表面可觀測到含有二氧化碳的氣泡", "D": "需在白色箭頭處塞入不可通氣的橡皮塞，留住氣體以準確記錄"}, "answer": ["C"], "expl": "(A) 酵母菌液與糖水應在燒杯中先行攪拌均勻後再置入發酵管，在發酵管內搖晃\n可能又會產生額外氣泡不利觀察。 (B) 混合液體的液面高度應高過黑色箭頭標記\n處，才利於觀察發酵氣體產生後占有的體積變化量。 (D) 白色箭頭處應以透氣塞\n或棉球塞好，若以不透氣橡皮塞密封，可能會因短時間氣體產生量過大導致發\n酵管爆裂。", "cross": false}, {"id": "F112-34", "year": 112, "no": 34, "ch": "選Ⅰ 細胞與遺傳", "chn": 1, "topic": "學生能熟習發酵管與發酵實驗的操作", "diff": "中", "section": "分科", "kind": "single", "stem": "某生在正確配置後開始進行甲、乙、丙三組的發酵實驗，結果如圖 6 所 示。下列敘 B": "溶小體（溶體）", "C": "高基氏體", "D": "細胞核"}, "answer": ["B"], "expl": "(A) 內質網和物質運輸、醣類代謝、脂質合成有關。 (B) 溶小體（溶體）含多種水\n解酵素，為分解物質的重要胞器。 (C) 高基氏體和物質的修飾有關。 (D) 細胞核和\n遺傳物質的儲存、基因表現有關。故 (A) (C) (D) 和細胞分解物質較無直接關聯。", "cross": false}, {"id": "F113-2", "year": 113, "no": 2, "ch": "選Ⅲ 動物構造與生理", "chn": 3, "topic": "激素的功能", "diff": "中偏易", "section": "分科", "kind": "single", "stem": "急救時，醫生常以強心劑增加病人心臟收縮力及提升血壓。下列何者可用來做強心劑？", "options": {"A": "腎上腺素", "B": "胰島素", "C": "睪固酮", "D": "心房排鈉肽"}, "answer": ["A"], "expl": "(A) 腎上腺素可以促進心搏加快、血管收縮，促進血壓上升。 (B) 胰島素促進血糖\n的利用與儲存，可降低血糖。 (C) 睪固酮和雄性第二性徵的發育、生殖細胞的成\n熟有關。 (D) 心房排鈉肽和體液鈉離子濃度的調節有關，減少鈉的再吸收，最終\n導致血壓下降。故 (B) (C) (D) 與增加心臟收縮力、提升血壓較無關。", "cross": false}, {"id": "F113-3", "year": 113, "no": 3, "ch": "選Ⅱ 植物", "chn": 2, "topic": "葉的構造與功能", "diff": "中偏易", "section": "分科", "kind": "single", "stem": "下列有關植物葉子的敘述，何者正確？", "options": {"A": "水稻葉子具網狀葉脈", "B": "洋蔥的複葉上有腋芽", "C": "橘子有掌狀複葉", "D": "豌豆的捲鬚是特化的葉子"}, "answer": ["D"], "expl": "(A) 水稻為單子葉植物，具有平行脈的單葉。 (B) 洋蔥為管狀單葉。 (C) 橘子具有單\n身複葉。", "cross": false}, {"id": "F113-4", "year": 113, "no": 4, "ch": "選Ⅲ 動物構造與生理", "chn": 3, "topic": "人體肌肉的種類、神經與內分泌對肌肉的調控", "diff": "中偏易", "section": "分科", "kind": "single", "stem": "下列有關人體肌肉與其調控方式的敘述，何者正確？", "options": {"A": "幫助腸道蠕動的肌肉是隨意肌", "B": "組成靜脈血管的肌肉是橫紋肌", "C": "心肌的收縮可經由內分泌系統調控", "D": "骨骼肌的收縮只受大腦意識調控"}, "answer": ["C"], "expl": "(A) 腸道由平滑肌控制其蠕動。 (B) 靜脈血管的肌肉為平滑肌。 (C) 心肌的收縮可受\n內分泌的影響，例如：腎上腺素可使心搏加快。 (D) 骨骼肌也受其他腦區和脊髓\n經由反射行為來調控。", "cross": false}, {"id": "F113-5", "year": 113, "no": 5, "ch": "選Ⅲ 動物構造與生理", "chn": 3, "topic": "激素的功能、圖表判讀", "diff": "中", "section": "分科", "kind": "single", "stem": "科學家在研究蜜蜂覓食和跳搖擺舞時的調控機制，發現使蜜蜂 產生覓食慾望與相關行為和腦內生物胺量的變化有關（圖 1）。 根據此結果推測，若在覓食前以腹部注射方法給予蜜蜂人工 合成的多巴胺（DA）和血清素（5-HT）後，觀察其對蜜蜂 覓食行為的影響，並以蔗糖覓食指數表示，指數愈高代表覓 食頻率愈高。下列何者是最可能的預期結果？", "options": {}, "answer": ["A"], "expl": "觀察題圖 1，無論蜜蜂處於何種覓食階段，血清素的濃度都無明顯起伏，但多\n巴胺的濃度在「抵達覓食點」與「開始跳舞」兩個階段明顯較高，可見多巴胺\n的濃度應和覓食行為較相關。額外施打多巴胺應可有效提升蜜蜂的覓食指數；\n額外施打血清素則無顯著提升，故選 (A) 。", "cross": false}, {"id": "F113-6", "year": 113, "no": 6, "ch": "選Ⅳ 生態與演化", "chn": 4, "topic": "理解「演化」的意義", "diff": "中偏易", "section": "分科", "kind": "single", "stem": "下列敘述中，何者為生物演化較合理的證據？", "options": {"A": "狗的體型與毛色有極大差異", "B": "加拉巴哥群島不同喙型的雀鳥，各自有不同的取食方式", "C": "蟒蛇因為使用不到四肢而造成四肢退化", "D": "增加溫度造成培養中的細菌大量死亡"}, "answer": ["B"], "expl": "(A) 全世界的狗仍屬於同一物種，並非演化的成果。 (B) 雀鳥的喙型差異造成不同\n取食方式，源自於祖先演化的結果。 (C) 演化不具有目的性。四肢退化的蟒蛇在\n環境壓力的篩選下具有生存上的優勢而留存，其餘的被淘汰。 (D) 此句未提到是\n否有未死亡的細菌留存、是否有新的表徵以通過環境壓力的篩選，與演化較無\n關。", "cross": false}, {"id": "F113-7", "year": 113, "no": 7, "ch": "選Ⅰ 細胞與遺傳", "chn": 1, "topic": "動物細胞與植物細胞的組成與特性、胞器的構造與功能", "diff": "中偏易", "section": "分科", "kind": "single", "stem": "下列有關植物與動物細胞構造之比較，何者正確？", "options": {"A": "植物的細胞膜組成含有醣類，動物則否", "B": "液泡只存在於植物細胞中，中心粒只存在於動物細胞中", "C": "植物細胞分裂時會在細胞中央產生細胞板，動物細胞則否", "D": "兩者的細胞核膜皆為單層膜構造，粒線體則具雙層膜構造"}, "answer": ["C"], "expl": "(A) 植物細胞和動物細胞於細胞膜外側的磷脂上均有醣類附著，具有辨識功能。\n (B) 動物細胞也具有儲存廢物的液泡，部分植物細胞如蘚苔、蕨類、蘇鐵和銀杏\n具有中心粒。 (C) 植物細胞才會產生細胞板，動物細胞會有分裂溝。 (D) 兩者的細\n胞核膜均為雙層膜。", "cross": false}, {"id": "F113-8", "year": 113, "no": 8, "ch": "選Ⅲ 動物構造與生理", "chn": 3, "topic": "人類胚胎發育的過程、人類生殖與內分泌的調節", "diff": "中偏易", "section": "分科", "kind": "single", "stem": "下列有關人類胚胎發育之敘述，何者正確？", "options": {"A": "卵在受精後，需移動至子宮才可開始進行卵裂", "B": "龍鳳雙胞胎一般是一個受精卵分裂成兩個胚胎而形成", "C": "囊胚著床後，子宮內膜會形成外胚層進行後續發育", "D": "人類絨毛膜促性腺素（HCG）可促進性腺分泌，維持子宮內膜厚度"}, "answer": ["D"], "expl": "(A) 卵受精後，在輸卵管運送的過程中就會開始進行卵裂。 (B) 龍鳳雙胞胎來自兩\n個受精的卵。 (C) 囊胚著床後，囊胚本身分化成外胚層、中胚層與內胚層，並繼\n續發育。 (D) HCG 可以維持黃體的功能使其持續分泌黃體素和動情素，以維持\n子宮內膜的厚度。", "cross": false}, {"id": "F113-9", "year": 113, "no": 9, "ch": "選Ⅰ 細胞與遺傳", "chn": 1, "topic": "PCR 技術及其應用", "diff": "中偏易", "section": "分科", "kind": "single", "stem": "某警察利用 PCR 技術分析刑案現場 DNA 樣本甲，以及嫌疑人乙、丙、 丁的血液 DNA 樣本。四樣本的 PCR 產物分別以同一膠體進行電泳結果 如圖 2，黑色條帶為產物在膠片上的訊號，產物分子量愈大泳動愈慢，條 帶會位於膠片較高位置。下列推論何者正確？", "options": {"A": "圖 2 可顯示轉錄後修飾現象的異同，可用來判斷誰最可能是犯人", "B": "圖 2 可觀測到基因點突變位置，以判斷犯人", "C": "三人之中，丁最有可能是此案的犯人", "D": "四個樣本的 PCR 反應需使用相同的引子對組合，才能進行比較分析"}, "answer": ["D"], "expl": "(A) 此膠體電泳為 DNA 樣本的 PCR 產物，無法觀察到 RNA 經轉錄後修飾的產\n物。 (B) 基因的點突變僅為一個核苷酸的改變，需要用桑格定序法（ ti", "stem": "下列有關植物激素及其功能的敘述，哪些正確？", "options": {"A": "授粉時期植物產生大量乙烯可避免提早落果", "B": "受精後需要吉貝素與離層酸來促進細胞分裂，導致果實膨大", "C": "久未萌發的種子可額外添加吉貝素打破休眠", "D": "葡萄授粉後以細胞分裂素處理，可以增加花穗數量", "E": "種子的成熟期離層酸增加，抑制種子過早萌發"}, "answer": ["C", "E"], "expl": "(A) 乙烯會促進落果，如需避免提早落果應使用生長素。 (B) 離層酸無法促進細胞\n分裂。 (C) 吉貝素可促進種子打破休眠。 (D) 吉貝素處理可促進花芽生長、增加花\n穗數量。 (E) 離層酸會促進種子休眠，避免過早萌發。", "cross": false}, {"id": "F113-14", "year": 113, "no": 14, "ch": "選Ⅳ 生態與演化", "chn": 4, "topic": "存活曲線的判讀", "diff": "中偏難", "section": "分科", "kind": "multi", "stem": "一物種面對不同的環境壓力，如食物資源豐富度、捕食 者與生存空間競爭，有不同的生存策略。圖 4 為三種類 型的存活曲線，下列相關敘述與推論，哪些正確？", "options": {"A": "大象壽命長、性成熟時間晚、產生較少後代，親代照 顧時間長，其存活曲線為類型Ⅰ", "B": "若氣候變遷，牡蠣幼苗著床率降低，其存活曲線可能 更向類型Ⅲ偏移", "C": "在資源豐富的環境中，麻雀因為容易獲取食物和避開捕食者，存活曲線多為類型Ⅲ", "D": "熱帶雨林的穩定環境有利於植物維持較恆定的存活率，故雨林植物均為類型Ⅱ", "E": "若昆蟲數量大增，在資源有限與競爭壓力下，其存活曲線會趨向類型Ⅲ"}, "answer": ["A", "B", "E"], "expl": "(A) 親代照顧時間長、子代數少，幼年存活率高，曲線偏向類型Ⅰ。 (B) 著床率降低，\n將使子代存活率低，曲線更接近類型Ⅲ。 (C) 資源豐富、易獲取食物，子代存活率\n較高，應偏向類型Ⅰ。 (D) 穩定的雨林環境，適合植物生長，曲線應偏向類型Ⅰ。\n (E) 競爭壓力大，子代存活率低，曲線趨向類型Ⅲ。", "cross": false}, {"id": "F113-15", "year": 113, "no": 15, "ch": "選Ⅲ 動物構造與生理", "chn": 3, "topic": "主動免疫與被動免疫、免疫記憶性、免疫抗性的建立", "diff": "中偏易", "section": "分科", "kind": "multi", "stem": "第一屆（1901 年）諾貝爾生理學醫學獎得主—德國貝林博士，於 1890 年與其同事北里博 士，將注射破傷風桿菌後存活的兔子血液抽出，待血液凝固後抽取上清液，並注入小鼠體 內。這些小鼠能在被破傷風桿菌感染後，仍得以存活。依題幹內容及現今免疫學的發現， 下列敘述哪些正確？", "options": {"A": "兔子血液中的紅血球是主要對破傷風桿菌產生抗性之血球細胞", "B": "兔子血漿中的破傷風桿菌毒素是讓小鼠存活的重要因子", "C": "將題幹所述之兔子血清注射入小鼠體內，並無法使該小鼠獲得對抗破傷風桿菌的終身免疫", "D": "小鼠在接受兔子血清後，身體產生專一對抗破傷風桿菌的免疫分子", "E": "被動物咬傷後，注射抗狂犬病血清以預防狂犬病，其防疫策略與題幹所述的案例類似"}, "answer": ["C", "E"], "expl": "(A) 兔子血液中對破傷風桿菌產生抗性的是各種白血球。 (B) 讓小鼠存活的重要因\n子為兔子血漿中的抗體。 (C) 兔子血清含對抗破傷風桿菌的抗體，來源是兔子的 \nB 細胞，須持續注射才能讓小鼠保有免疫力，這是一種「被動免疫」策略。 (D)\n接受兔子血清，小鼠只會產生對抗兔子血清的免疫分子，不會產生對抗破傷風\n桿菌的免疫分子。 (E) 注射的狂犬病血清也含對抗狂犬病的抗體，也是一種「被\n動免疫」策略。", "cross": false}, {"id": "F113-16", "year": 113, "no": 16, "ch": "選Ⅱ 植物", "chn": 2, "topic": "根的吸收與運輸", "diff": "中偏易", "section": "分科", "kind": "multi", "stem": "下列有關植物根吸收水分及礦物質的敘述，哪些正確？", "options": {"A": "根毛為表皮細胞衍 "2024 年 3 月下旬，粒線體毒素邦克列酸（米 酵菌酸）的食物中毒事件，引起國人高度重 視。圖 6 為粒線體產生及運送 ATP 的示意 圖，ATP 合成酶利用質子（H ＋）由高濃度流 向低濃度所釋出的電勢能，將 ADP 磷酸化產 生 ATP，而粒線體內膜上的 ATP∕ADP 轉 運酶則將 ADP 與 ATP 交換傳送至膜內外。 邦克列酸可與此轉運酶結合成複合體，進 而阻礙其傳送分子的功能，並使粒線體無 法產生 ATP，造成細胞無法正常運作甚至 死亡。依據圖 6、題幹內容及已習得知識，下列敘述哪些正確？", "options": {"A": "ATP 合成酶利用細胞分解大分子時所釋放出的能量來產生 ATP", "B": "ATP 和 ADP 的運送都會受到邦克列酸的影響", "C": "邦克列酸直接影響電子傳遞鏈的進行，造成細胞無法正常運作甚至死亡", "D": "因 H ＋ 流動釋出的電勢能，不會直接受到邦克列酸的影響", "E": "邦克列酸中毒的粒線體，因 ATP 合成酶被破壞而無法產生 ATP 供細胞使用"}, "answer": ["B", "D"], "expl": "(A) ATP 合成酶利用 H\n＋\n 流動釋出的電勢能來產生 ATP。 (B) ATP∕ADP 轉運酶可\n同時反向轉運 ATP 與 ADP，故當邦列克酸抑制此轉運酶時，兩者的運送都會受\n到影響。 (C) 邦克列酸不會影響電子傳遞鏈。 (D) H\n＋\n 流動釋出的電勢能可促進 ATP \n合成酶催化 ADP 與 Pi 合成 ATP。邦列克酸並不會影響 ATP 合成酶的活性，而\n是影響 ATP∕ADP 轉運酶，使 ATP 合成酶缺乏受質。 (E) 邦克列酸不會破壞 ATP \n合成酶。", "cross": false}, {"id": "F113-20", "year": 113, "no": 20, "ch": "生物(全) 基礎", "chn": 0, "topic": "文意判讀。學生能看懂演化樹，並了解「選擇性剪接」對 mRNA 與蛋白質產物", "diff": "中偏易", "section": "分科", "kind": "multi", "stem": "下列哪些動物的 TBXT 基因具有 AluY？", "options": {"A": "狐猴", "B": "長臂猿", "C": "紅毛猩猩", "D": "舊世界猴", "E": "人"}, "answer": ["B", "C", "E"], "expl": "類人猿才具有 AluY，根據題圖，人、黑猩猩、大猩猩、紅毛猩猩與長臂猿屬於\n類人猿，故選 (B) (C) (E) 。", "cross": false}, {"id": "F113-21", "year": 113, "no": 21, "ch": "選Ⅰ 細胞與遺傳", "chn": 1, "topic": "文意判讀。學生能了解「選擇性剪接」對 mRNA 與蛋白質產物的影響", "diff": "難", "section": "分科", "kind": "multi", "stem": "下列與選擇性剪接相關之敘述，哪些正確？", "options": {"A": "在 TBXT 基因 E5 與 E6 之間的內含子序列，經選擇性剪接不一定會被切除", "B": "選擇性剪接使全長和截短型 TBXT mRNA 不能同時出現在同一細胞", "C": "全長和截短型 TBXT mRNA 只差在有無 E6 序列", "D": "選擇性剪接使類人猿的 TBXT 基因產生了功能不一樣的 TBXT 蛋白質", "E": "細菌細胞也具有選擇性剪接功能"}, "answer": ["C", "D"], "expl": "(A) 根據文本，進行正常的選擇性剪接後，E5 和 E6 間的內含子會被切除。 (B) 若 \nAluSx1 和 AluY 配對形成髮夾的事件為隨機發生，同一細胞在轉譯時可能同時會\n產生兩種 TBXT 蛋白質。 (C) (D) 截短型 TBXT mRNA 較全長型截去了 E6 序列，使\n轉譯產生的 TBXT 蛋白質不同。 (E) 細菌不具內含子，也沒有選擇性剪接的功能。", "cross": false}, {"id": "F113-22", "year": 113, "no": 22, "ch": "選Ⅰ 細胞與遺傳", "chn": 1, "topic": "文意判讀。學生能了解「選擇性剪接」對 mRNA 與蛋白質產物的影響", "diff": "難", "section": "分科", "kind": "single", "stem": "下列與本文相關的敘述，何者正確？", "options": {"A": "人類不會產生全長型 TBXT 蛋白質，因此缺失尾巴", "B": "活的實驗小鼠，只要有截短型 TBXT 存在就足以誘發尾部缺失", "C": "本研究建構不含 E6 的 TBXT 基因突變同型合子小鼠，證明截短型 TBXT 蛋白質與尾部缺 失有關", "D": "AluY 和 AluSx1 都是基因調控蛋白質"}, "answer": ["B"], "expl": "(A) 人類會產生全長型與截短型 TBXT 蛋白質。 (B) 文本提到，雜合子小鼠有一個 \nTBXT 基因不含 E6 外顯子，產生截短型 TBXT 蛋白質就足以誘發尾部缺失。 (C)\n研究建構的 TBXT 基因突變小鼠為雜合子（異型合子），才可看到截短型 TBXT \n蛋白質對尾部缺失的影響。若為同型合子，缺乏全長型 TBXT 蛋白質，小鼠會\n死亡。 (D) AluX 和 AluSx1 都是基因調控的 DNA 序列。", "cross": false}, {"id": "F113-23", "year": 113, "no": 23, "ch": "選Ⅰ 細胞與遺傳", "chn": 1, "topic": "文意判讀。學生能從文本中學習「SNP」的意義並判斷其對基因表現的影響", "diff": "中偏易", "section": "分科", "kind": "single", "stem": "基於上述分析，下列推論何者正確？", "options": {"A": "DNA 序列變異造成基因表現量不同而造成個體差異", "B": "IGF1 的表現量影響 SNP 的分布", "C": "SNP 無法應用在尋找可能導致疾病的基因", "D": "染色體 15 上只有一個基因影響個體大小之決定"}, "answer": ["A"], "expl": "(A) 文本提到染色體 15 上 2 個基因座的 SNP 與 IGF1 mRNA 和 IGF1 蛋白質表現量\n有相關，故可推得 DNA 序列的變異影響基因表現的成果。 (B) 應為 SNP 的分布影\n響 IGF1 的表現量。 (C) 可藉由調查患病者族群與健康族群基因序列中的 SNP，來\n尋找可能致病的基因。 (D) 文本所列，染色體 15 上有兩個基因座的基因影響犬隻\n的個體大小。", "cross": false}, {"id": "F113-24", "year": 113, "no": 24, "ch": "選Ⅰ 細胞與遺傳", "chn": 1, "topic": "文意判讀。學生能從文本中學習「SNP」的意義並判斷其對基因表現的影響", "diff": "中偏易", "section": "分科", "kind": "single", "stem": "本文中所做的全基因體序列、SNP、IGF1 和犬個體大小的分析結果，下列推論何者正確？", "options": {"A": "IGF1 是唯一調控個體大小的基因", "B": "SNP 可能位於 IGF1 基因座的內含子，而使其蛋白質功能受影響", "C": "SNP 可能位於 IGF1 基因座的啟動子，並影響其基因轉錄效率", "D": "SNP 可能導致 IGF1 基因的 mRNA 在大型犬易分解"}, "answer": ["C"], "expl": "(A) 文本僅提到 IGF1 和個體大小調控有關，是否為唯一尚未知。 (B) SNP 若分布\n於 1GF1 基因座的內含子，在 mRNA 剪接與修飾時可能會被剪除，不一定會影\n響到蛋白質含量。 (C) IGF1 的 SNP 對其 mRNA 和蛋白質的表現量都有影響，故 \nSNP 應位在 IGF1 基因座的外顯子或調節序列上。啟動子是可能的選項。 (D) 文本\n有提到小型犬的 IGF1 蛋白較大型犬少，故 SNP 可能導致小型犬的 IGF1 mRNA \n易分解。", "cross": false}, {"id": "F113-25", "year": 113, "no": 25, "ch": "選Ⅰ 細胞與遺傳", "chn": 1, "topic": "文意判讀。學生能從文本中學習「SNP」的意義並判斷其對基因表現的影響", "diff": "中偏易", "section": "分科", "kind": "single", "stem": "下列關於 SNP 的敘述，何者正確？", "options": {"A": "SNP 不會出現於「編碼 DNA」中，而改變蛋白質", "B": "SNP 其形成原因通常為染色體大片斷缺失，這樣的變異影響該基因型的表現", "C": "SNP 的基因多樣性是自然現象，不適合用於人類疾病相關研究", "D": "在育種時，可利用 SNP 以建立品系資料"}, "answer": ["D"], "expl": "(A) SNP 可能出現在 DNA 序列的任意位置，包含編碼 DNA、未編碼區。 (B) SNP \n為單核苷酸多型性，故不會有染色體大片段缺失。 (C) 經由比較患病者與健康者\n的 SNP，可了解致病的基因與致病的機制、預防或開發可行的療法。 (D) 可透過 \nSNP 建立品系資料，將欲育種的物種的生長特性（如體型、壽命等）歸類。", "cross": false}, {"id": "F113-26", "year": 113, "no": 26, "ch": "選Ⅳ 生態與演化", "chn": 4, "topic": "文意判讀。學生能從文本和圖表中了解孢粉化石形成的年代，配合其生長習性", "diff": "中偏易", "section": "分科", "kind": "single", "stem": "甲地最可能發生海水入侵淹沒土地的年代為何？", "options": {"A": "1040～2990 年前", "B": "2990～3100 年前", "C": "3100～3800 年前", "D": "3800～4500 年前"}, "answer": ["C"], "expl": "紅樹林為河口泥灘地植物，可推測其生長環境有海水入侵。紅樹林孢粉化石約\n在 3100～3800 年前出現，推測此年代為海水入侵的時間，故選 (C) 。", "cross": false}, {"id": "F113-27", "year": 113, "no": 27, "ch": "選Ⅳ 生態與演化", "chn": 4, "topic": "文意判讀。學生能從文本和圖表中了解孢粉化石形成的年代，配合其生長習性", "diff": "中偏易", "section": "分科", "kind": "single", "stem": "甲地最有可能是在臺灣的哪一個地區？", "options": {"A": "嘉明湖", "B": "蘭陽溪口", "C": "日月潭", "D": "高屏溪上游"}, "answer": ["B"], "expl": "甲地曾有紅樹林分布，應為河口，故選 (B) 蘭陽溪口。", "cross": false}, {"id": "F113-28", "year": 113, "no": 28, "ch": "選Ⅳ 生態與演化", "chn": 4, "topic": "文意判讀。學生能從文本和圖表中了解孢粉化石形成的年代，配合其生長習性", "diff": "中偏難", "section": "分科", "kind": "multi", "stem": "根據圖 9，下列敘述哪些正確？", "options": {"A": "此為初級消長（初級演替）的過程", "B": "禾草為該地群集的先驅種", "C": "紅樹林為過渡群集的關鍵種", "D": "禾草豐富度的改變，顯示該地群集仍在消長中", "E": "紅樹林和香蒲在 3100～3800 年前時有不同生態區位"}, "answer": ["D", "E"], "expl": "(A) 此地並非首次有物種發生，應為次級演替。 (B) 禾草最靠近現代才出現。 (C) 根\n據題圖，紅樹林可能為先驅群集。 (D) 禾草的豐富度改變，生活於其中的物種結\n構可能也隨之改變，故可推斷仍處於演替中。 (E) 紅樹林和香蒲在 3100～3800 年\n前時豐富度持續發生變化，可能是與群集中其他物種互動的結果，生態區位也\n持續在改變。", "cross": false}, {"id": "F113-29", "year": 113, "no": 29, "ch": "選Ⅰ 細胞與遺傳", "chn": 1, "topic": "植物細胞的外觀特徵、滲透壓對細胞的影響、細胞分裂期的細胞外形特徵", "diff": "易", "section": "分科", "kind": "single", "stem": "圖 10 為某生利用顯微鏡所觀察到的細胞。下列有關此細胞的敘述，何者正 確？", "options": {"A": "此細胞正在進行有絲分裂", "B": "甲是植物的厚壁組織", "C": "乙是膨大後的植物液泡", "D": "此細胞在高張溶液中"}, "answer": ["D"], "expl": "(A) 無法觀察到染色體，並非處於細胞分裂期。 (B) 甲為仍可見細胞核的活細胞，\n並非厚壁的死細胞。 (C) 乙處在萎縮狀態。 (D) 此細胞的細胞膜與細胞壁分離，應\n為於高張溶液中發生的質離現象。", "cross": false}, {"id": "F113-30", "year": 113, "no": 30, "ch": "選Ⅰ 細胞與遺傳", "chn": 1, "topic": "酵素活性與溫度的關係", "diff": "易", "section": "分科", "kind": "single", "stem": "某生進行多項酵素活性測定實驗，下列敘述何者正確？", "options": {"A": "為求實驗結果精準，市場買的豬肝與馬鈴薯應先浸泡在清潔劑中洗刷乾淨", "B": "為避免酵素衰退，自市場買的豬肝與馬鈴薯可先暫存在 4 ℃ 冷藏庫中備用", "C": "新鮮樣本由室溫置入 4 ℃ 冷藏庫後，過氧化氫酶隨溫度下降而活性上升", "D": "過氧化氫酶在 37 ℃ 即失去活性"}, "answer": ["B"], "expl": "(A) 若浸泡於清潔劑中洗刷，兩材料的細胞膜可能被破壞，使細胞死亡、酵素流\n失。 (B) 低溫可有效降低酵素活性，利於實驗材料的暫存。 (C) 過氧化氫酶活性隨\n溫度下降而下降。 (D) 過氧化氫酶最佳作用溫度在 20～40 ℃ 間，高溫 80 ℃ 後始\n失去活性。", "cross": false}, {"id": "F113-31", "year": 113, "no": 31, "ch": "選Ⅱ 植物", "chn": 2, "topic": "光合色素的色層分析、光合色素的吸收光譜", "diff": "易", "section": "分科", "kind": "single", "stem": "圖 11 是綠色植物和藻類中常見的光合色素吸收光譜。某生 使用長條濾紙，以石油醚：丙酮＝9：1 為展開液進行光合色 素之層析分離實驗中，分別計算甲、乙、丙三種色素的 Rf 值（Rf 值＝濾紙上色素移動上升的距離∕濾紙上展開液移動 上升的距離），試問 Rf 值由大到小依序為何？", "options": {"A": "甲、丙、乙", "B": "丙、乙、甲", "C": "乙、丙、甲", "D": "甲、乙、丙"}, "answer": ["C"], "expl": "甲為葉綠素 b，乙為類胡蘿蔔素（葉黃素、胡蘿蔔素），丙為葉綠素 a。Rf 值\n由大至小依序為：胡蘿蔔素→葉黃素→葉綠素 a →葉綠素 b，故選 (C) 。", "cross": false}, {"id": "F113-32", "year": 113, "no": 32, "ch": "選Ⅱ 植物", "chn": 2, "topic": "希爾反應", "diff": "易", "section": "分科", "kind": "multi", "stem": "某生利用二氯酚吲哚酚（2,6-dichlorophenol indophenol, DCPIP）進行一組實驗，各離心管 所加試液與處理方式如表 1，下列有關此實驗之敘述，哪些正確？ 表 1 甲 乙 丙 丁 0.5 M 蔗糖溶液 3 mL 4 mL 3 mL 4 mL 0.1％ DCPIP 溶液 0.5 mL 0.5 mL 0.5 mL 0.5 mL 葉綠體懸浮液 1 mL － 1 mL － 光照處理 照光 照光 黑暗（包鋁箔） 黑暗（包鋁箔）", "options": {"A": "此為希爾反應實驗", "B": "可用酒精取代蔗糖溶液", "C": "實驗過程有兩次的離心，第一次離心目的是使雜質沉澱並將沉澱物去除", "D": "第二次離心的沉澱物中含有葉綠體", "E": "實驗完成後，試管內的呈色分別為甲：藍綠色、乙：藍色、丙：淺綠色、丁：藍色"}, "answer": ["A", "D"], "expl": "(B) 蔗糖溶液為等張溶液，酒精會讓葉綠體失去活性。 (C) 第一次離心是將葉綠體\n沉澱後去除上清液，再以蔗糖溶液懸浮，以得到濃度較高的葉綠體懸浮液。 (D)\n第二次離心目的為將懸浮的葉綠體沉澱，以利觀察 DCPIP 的顏色變化。 (E) 實驗\n完成後，四管離心管顏色分別為甲：淺綠色、乙：藍色、丙：藍綠色、丁：藍\n色。", "cross": false}, {"id": "F113-33", "year": 113, "no": 33, "ch": "選Ⅳ 生態與演化", "chn": 4, "topic": "天擇對生物演化的影響", "diff": "易", "section": "分科", "kind": "single", "stem": "下列何者支持工業革命和黑白蛾的比例有關的主張？", "options": {"A": "鳥類在環境改變前後持續顯著的選食黑化型胡椒蛾", "B": "煤煙改變環境使胡椒蛾的隱蔽效果改變", "C": "空氣中的二氧化硫與煤煙對白蛾的毒性較強", "D": "胡椒蛾在工業革命後白化型突變成黑化型"}, "answer": ["B"], "expl": "(A) 在工業革命後鳥類的選食習性是否改變未知，但黑色蛾的確有較好的隱蔽效\n果、不易被鳥發現，故黑白蛾的比例改變應與鳥類選食習性較無關。 (B) 文本中\n提及煤煙使蘚苔和地衣死亡、樹幹顏色明顯變黑，降低黑色蛾被捕食機會。 (C)\n二氧化硫和煤煙對蛾類的毒性差異未於文本中提及。 (D) 白化型是否突變成為黑\n化型也未在文本中提及。", "cross": false}, {"id": "F113-34", "year": 113, "no": 34, "ch": "選Ⅳ 生態與演化", "chn": 4, "topic": "天擇對生物演化的影響", "diff": "易", "section": "分科", "kind": "single", "stem": "以論證建模的方式分析本文，下列何者為本文的結論？", "options": {"A": "胡椒蛾顏色黑白的轉變是演化的結果", "B": "人類造成的環境變化使胡椒蛾快速演化", "C": "胡椒蛾在工業革命前白化型不易突變成黑化型", "D": "黑白胡椒蛾比例的改變主要是天擇的結果"}, "answer": ["D"], "expl": "(A) 文本提到胡椒蛾原本就具有黑與白兩色，且仍屬於同種。 (B) 人類造成的環境\n變化最終導致胡椒蛾族群的體色比例發生改變，但兩體色的個體都還存在於族\n群中，演化尚未發生。 (C) 從文本來看，胡椒蛾的兩種體色比例改變並非突變的\n結果，而是被捕食率與存活率改變的影響。 (D) 黑白蛾比例改變是被捕食機率的\n環境壓力導致，是天擇的結果。", "cross": false}, {"id": "F113-35", "year": 113, "no": 35, "ch": "選Ⅲ 動物構造與生理", "chn": 3, "topic": "蛙的構造與觀察", "diff": "易", "section": "分科", "kind": "multi", "stem": "下列有關青蛙外部形態與內部構造的敘述，哪些正確？", "options": {"A": "青蛙沒有外耳，鼓膜位於眼睛後方的體表處，能感受到外界音波的震動", "B": "剪開青蛙皮膚後，發現皮膚與內側的肌肉之間有大片結締組織緊密相連", "C": "雄蛙常藉由鳴叫來求偶，雌蛙亦會回應，雄蛙與雌蛙頭部腹面均可觀察到鳴囊", "D": "蛙的心臟位於胸部的圍心膜內，剪開心臟後可觀察到二心房一心室", "E": "雄蛙具一對睪丸，位於腹腔外的陰囊中，此處溫度較低有利於精子的發育"}, "answer": ["A", "D"], "expl": "(B) 蛙的皮膚與肌肉並無緊密相連。 (C) 僅雄蛙具有鳴囊。 (D) 兩生類的心為二心房\n一心室。 (E) 雄蛙睪丸位於體腔內腎臟的前方。", "cross": false}, {"id": "F113-36", "year": 113, "no": 36, "ch": "選Ⅰ 細胞與遺傳", "chn": 1, "topic": "遺傳的染色體學說、孟德爾遺傳法則、連鎖與互換、基因表現", "diff": "易", "section": "分科", "kind": "multi", "stem": "根據遺傳的染色體學說及其衍生的現代觀念，下列敘述哪些正確？", "options": {"A": "位於同一染色體上的不同基因，形成配子時遵循孟德爾的獨立分配律", "B": "位於同源染色體上的等位基因，形成配子時遵循孟德爾的分離律", "C": "子代的表現型完全由卵細胞染色體上的基因決定", "D": "基因由染色體所攜帶，傳遞到子代中", "E": "等位基因為基因表現的產物"}, "answer": ["B", "D"], "expl": "(A) 位於同一染色體上的不同基因，若為連鎖、沒有互換發生，將不遵循孟德爾的獨\n立分配律。 (B) 等位基因隨同源染色體於減數分裂時分離、再於受精後成對，遵循分\n離律。 (C) 有些子代性狀的表現型有些由卵細胞染色體上的基因決定，有些表現型\n由精子和卵細胞染色體上的基因共同決定。 (D) 基因為染色體的 DNA 序列，隨染色\n體傳遞至子代細胞中。 (E) 一等位基因為一基因在同源染色體上的其中一種型式。", "cross": false}, {"id": "F113-38", "year": 113, "no": 38, "ch": "選Ⅳ 生態與演化", "chn": 4, "topic": "食物鏈、生物放大", "diff": "中偏易", "section": "分科", "kind": "single", "stem": "根據圖 12，下列敘述何者較合理？", "options": {"A": "農田活動的猛禽已有抗藥性", "B": "老鼠藥的影響範圍僅限於農田環境", "C": "農田的老鼠不會利用森林棲地", "D": "丙可能是偏好在森林邊緣活動的猛禽"}, "answer": ["D"], "expl": "(A) 只能看到死亡猛禽的老鼠藥檢出率，無法得知猛禽是否有抗藥性。 (B) 天然森\n林中的死亡猛禽體內也有老鼠藥的殘留，故影響不僅限於農田環境。 (C) 天然森\n林中，猛禽丙的食物也包括老鼠，顯示老鼠也會利用森林棲地。 (D) 丙、丁、戊\n都是在天然森林活動的猛禽。丙的老鼠藥檢出率最高，推測其活動領域可能在\n森林邊緣靠近農田，故有較大的機會食用含老鼠藥的獵物。", "cross": false}, {"id": "F113-42", "year": 113, "no": 42, "ch": "選Ⅲ 動物構造與生理", "chn": 3, "topic": "消化、小腸的構造", "diff": "中偏易", "section": "分科", "kind": "multi", "stem": "細菌感染引發急性腸道局部發炎時，對血液內維生素 C 的影響比維生素 E 較顯著的原因為 何？（2 分）", "options": {}, "answer": ["C", "E"], "expl": "水溶性營養素需仰賴膜蛋白協助吸收，脂溶性營養素可直接穿過細胞膜自腸腔\n進入表皮細胞中。急性的腸道局部發炎使微絨毛數目下降、也可能減少膜蛋白\n的數量，故對水溶性營養素的吸收影響較大。", "cross": false, "imgs": ["data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAABFwAAABRCAIAAABgyiVTAAAACXBIWXMAAA7EAAAOxAGVKw4bAABKZ0lEQVR4nO2dC7xOVf7/qcj9TojKJSLkfgshDEIoQhKFkApRcisVheSWS7kUJddSjOtQUUmMCklPpp6ppts0TdOYamqm5v/2fH/P+q9Z+3L2Oc45j9/Pd78+r/Pazz77svZa3/X9fj573XL8RzfddNNNN91000033XTT7QzecqQ6Aae6/fs///nGwmcKhUKhUCgUCoUi6/FVkoH/nGpFcOrb/3pRRBnEkvjQ2lcoFAqFQqFQKBRZh3hy50SqFcGpbyqKFAqFQqFQKBQKRboRT+6oKEr9pqJIoVAoFAqFQqHIfsSTOyqKUr+pKFIoFAqFQqFQKLIf8eSOiqLUbyqKFAqFQqFQKBSK7Ec8uaOiKPWbiiKFQqFQKBQKhSL7EU/uqChK/aaiSKFQKBQKhUKhyH7EkzsqilK/nSaiaN/XX7/788+Zdbfdn366fNeuN/78Z++/Dnz77eq9e4/89FNmPStjyd589OieP/0pizJz05Ej+//61yy6uYODf//70u3bj/3yS8Yu3/XRR+//+mv2JDXDeOvECe/BrCu+/3XY+9VX2z/4IBPL8dAPP2SzVVCLj/7rX/ZOpuD5gwcz90XwbBmuawYHv/suc5OU1aUTEW//4x8pT4MgKCi88sknp0Ni9v3lLy9//HHKc8kLtaXoachEvpQuwKxeePttX7cGsyIWpHkHPJivE8Ms3/n++6xLeSY69jTx0h//+N6//x39/HhyR0VR6rfTRBRdf+utZcqXf/y3vzVH3vzmm/BL4NNB/3r2tdfy5M0LWff+iypdsHDhCXPnmiMwsAwkuNuNN17WqNF9Cxd26Nnz4aee8j0HH0E99/3XtTffXKps2Q1vvRX+FKpxSE2etny5bxRp3Lr1WWedNWb6dN+rtrz3Hlm357PPXv/yy+krVlzVqxeeyFRgvBWXL966NWI+TFmyJFeuXOSGffDwjz9GvLxw0aJFS5RYuHGj739RI5WqVSOvdhw/7nvCa198MW7WLONhSTaJR/fGEvYTdFuMbf6GDb7vMnvNGu/xAaNGzXjmGfsIGiBnzpxtu3XzjQ0Y3gNPPEH2RgGv0OuWWzCVoCxC23fv3983S7l25Z499hE06rIdO7Kh3G0s2rQ 正確？", "options": {"A": "風媒花通常產生較多量的花粉", "B": "蟲媒花通常顏色較為暗淡且常呈現斑紋", "C": "鳥媒花與蟲媒花的構造相似，不易區分", "D": "自花授粉主要發生在單性花"}, "answer": ["A"], "expl": "(A) 風媒花花色較不鮮豔，亦無花蜜，全仰賴風傳粉，常產生大量的花粉增加其\n傳粉成功率。 (B) (C) 鳥媒花與蟲媒花多以鮮豔花色、香氣和蜜腺吸引傳粉者，但\n鳥媒花的花冠更加厚實、花絲與花柱更堅固以承受鳥類的拜訪，兩者仍可區分。\n (D) 自花授粉多發生在兩性花。", "cross": false}, {"id": "F114-6", "year": 114, "no": 6, "ch": "選Ⅰ 細胞與遺傳", "chn": 1, "topic": "植物的自花授粉、無性繁殖與多倍體和同域種化的關聯性", "diff": "中偏難", "section": "分科", "kind": "single", "stem": "同域種化的現象在植物界較動物界常見，過程中常常牽涉到多倍體的形成。有關植物種化 的概念或現象，下列何者正確？", "options": {"A": "植物的同域種化過程中，經常依賴植物體具有無性繁殖或是自花授粉的能力", "B": "植物演化過程中，染色體倍增的現象和自花授粉的方式沒有任何關聯", "C": "人類對作物進行育種的過程中，從未使用形成異源多倍體的技術", "D": "現代植物細胞組織培養技術發達之後，不影響人為產生新物種的機率 9 生物"}, "answer": ["A"], "expl": "(A) 異源、同源雜交體植株形成後常因染色體數量異常而無法與原先的二倍體正\n常交配。但無性生殖與自花授粉卻讓這些植株有辦法增加其族群數量。當族群\n夠龐大將可預期有突變產生而建立雙二倍體，成為新物種，進而形成同域種化。\n (B) 自花授粉讓雜交體仍能產生下一代而維持其族群大小。當族群規模夠大，隨\n機的染色體倍增將有機會發生。 (C) 嘗試將蘿蔔與甘藍菜進行育種的蘿蔔甘藍即\n為異源多倍體的實例。 (D) 組織培養技術可大幅增加族群數量，提升發現雙二倍\n體的成功率。一旦雙二倍體建立且繁衍，新物種即誕生。", "cross": false}, {"id": "F114-7", "year": 114, "no": 7, "ch": "生物(全) 基礎", "chn": 0, "topic": "如何運用生物技術合成大豆根瘤菌血紅蛋白", "diff": "中偏難", "section": "分科", "kind": "single", "stem": "「不可能的漢堡」使用非肉製素食漢堡排，其外觀與口感和牛絞肉所製成的漢堡排近似。 此素食漢堡排在主原料大豆蛋白外，加入由酵母菌產生的大豆根瘤菌血紅蛋白，使其具有 肉汁感。依據上文及已習得知識，下列敘述何者正確？", "options": {"A": "肉汁感是由「不可能的漢堡」中，大豆根瘤菌血紅蛋白的核苷酸所造成", "B": "「不可能的漢堡」使用的大豆根瘤菌血紅蛋白，是由重組 DNA 技術產生", "C": "大豆根瘤菌血紅蛋白是一種特殊的大豆蛋白質", "D": "酵母菌產生大豆根瘤菌血紅蛋白的機制，與其產生酒精的機制相同"}, "answer": ["B"], "expl": "(A) 由大豆根瘤菌血紅蛋白本身的結構特性造成。 (B) 根據題幹，此大豆根瘤菌血\n紅蛋白由經基因轉殖的酵母菌產生。 (C) 大豆根瘤菌血紅蛋白由大豆根瘤產生，\n可協助捕捉根瘤中的氧分子，建立低氧環境以利根瘤菌進行固氮作用，而非大\n豆蛋白（來自大豆種子）。 (D) 酵母菌經基因轉殖後生成大豆根瘤菌血紅蛋白；\n酒精來自酵母菌的酒精發酵，兩者生成機制完全不同。", "cross": false}, {"id": "F114-8", "year": 114, "no": 8, "ch": "選Ⅰ 細胞與遺傳", "chn": 1, "topic": "圖表判讀、物質進出細胞的方式、細胞壁對滲透度與細胞外型的影響", "diff": "中偏易", "section": "分科", "kind": "single", "stem": "某生進行生態訪查，採集到某一樣本，將其細胞放入含有不同鹽濃度的甲到丙液體中，觀 察其變化，如圖 1 所示。對照表 1 不同地區之鹽濃度後，某生最有可能採集到下列哪個物 種？ 高山河水 出海口 海 洋 鹽度（％） ＜0.01 0.5～3.0 3.3～3.7", "options": {"A": "濁水溪上游岩石上的淡水藻", "B": "淺海區的馬尾藻", "C": "潮間帶的文蛤", "D": "珊瑚礁的小丑魚"}, "answer": ["B"], "expl": "此生物細胞具有細胞壁（在甲液體質壁分離、在丙液體僅膨脹不破裂），在乙\n液體中無膨脹、無質壁分離，可推測其等張溶液應在鹽度 3.5％ 左右。故選海洋\n中具有細胞壁的生物 (B) 馬尾藻。", "cross": false}, {"id": "F114-9", "year": 114, "no": 9, "ch": "選Ⅳ 生態與演化", "chn": 4, "topic": "遺傳多樣性低落對族群造成的影響", "diff": "中偏易", "section": "分科", "kind": "single", "stem": "對於遺傳多樣性較低族群之敘述，下列何者正確？", "options": {"A": "面對氣候變遷時，具有較高的適應能力", "B": "不易發生由隱性等位基因所形成的同型合子", "C": "棲地被切割後較可能使該族群局部滅絕", "D": "可藉由馴化個體增大族群以增加其遺傳多樣性"}, "answer": ["C"], "expl": "由於遺傳多樣性較低，故 (A) 在面對氣候變遷時適應力較差、 (B) 容易發生隱性同\n型合子、 (C) 棲地經切割後可能導致遺傳多樣性更低而走向滅絕。 (D) 馴化個體經\n過人為篩選，遺傳多樣性亦不高，故加入此遺傳多樣性較低族群之基因池，亦\n難提升其遺傳多樣性。", "cross": false}, {"id": "F114-10", "year": 114, "no": 10, "ch": "選Ⅳ 生態與演化", "chn": 4, "topic": "圖表判讀、擾動對物種豐富度的影響", "diff": "中偏易", "section": "分科", "kind": "single", "stem": "圖 2 為某生態學家在甲生態系調查多年的結果示意圖。依此圖下列推論何者正確？", "options": {"A": "這個生態系中，環境的低度擾動程度（Ⅰ）最有利於維護當地的物種多樣性", "B": "某年是甲地歷年來強烈颱風來襲最多次數的一年，則該年度會因此高擾動而促進生物的 多樣性", "C": "物種豐富度在中度擾動程度（Ⅱ）下最高", "D": "高度擾動程度（Ⅲ）有利於增加族群的遺傳多樣性"}, "answer": ["C"], "expl": "(A) (C) 物種豐富度在擾動程度Ⅱ時最高。 (B) (D) 高擾動程度（Ⅲ）時物種豐富度最\n低，會降低生物多樣性。", "cross": false}, {"id": "F114-11", "year": 114, "no": 11, "ch": "選Ⅰ 細胞與遺傳", "chn": 1, "topic": "DNA X 光繞射分析的歷程事件、人物與其發現", "diff": "中偏易", "section": "分科", "kind": "single", "stem": "有關 DNA X 光繞射分析的敘述，下列何者正確？", "options": {"A": "華生與克里克以 DNA 結晶進行 X 光繞射分析", "B": "弗蘭克林利用 X 光繞射分析的結果，推測 A 與 T 配對，C 與 G 配對", "C": "分析 X 光繞射圖推算雙股螺旋 DNA 分子的一個螺旋圈約含有 10 對 核苷酸", "D": "分析 X 光繞射圖顯示雙螺旋每一圈的長度是 3.4 mm"}, "answer": ["C"], "expl": "(A) 弗蘭克林以 X 光繞射分析 DNA 結晶。 (B) A 與 T 配對、C 與 G 配對為查加夫\n所提出。 (C) X 光繞射圖經華生和克里克分析，雙股螺旋 DNA 分子每一螺旋圈約 \n10 對核苷酸。 (D) X 光繞射圖經華生推測螺距（每一圈）為 3.4 nm，非 3.4 mm。", "cross": false}, {"id": "F114-12", "year": 114, "no": 12, "ch": "選Ⅰ 細胞與遺傳", "chn": 1, "topic": "DNA 的化學結構", "diff": "易", "section": "分科", "kind": "single", "stem": "圖 4 為組成 DNA 構造的部分結構，下列敘述何者正確？", "options": {"A": "甲為雙硫鍵", "B": "乙為 DNA 結構中的核糖", "C": "丙為鳥糞嘌呤（含氮鹼基 G）", "D": "DNA 的雙磷鍵是由兩個相鄰五碳醣上的 5' 磷酸根所形成"}, "answer": ["C"], "expl": swer": ["B", "D", "E"], "expl": "(A) 類胡蘿蔔素主要吸收波長在 400～600 nm 之間。 (C) 光系統Ⅰ的電子傳遞鏈僅\n會產生 ATP。", "cross": false}, {"id": "F114-17", "year": 114, "no": 17, "ch": "選Ⅲ 動物構造與生理", "chn": 3, "topic": "乙醯膽鹼受體與體運動神經和自律神經的訊息傳遞", "diff": "中", "section": "分科", "kind": "multi", "stem": "「重症肌無力」是因為骨骼肌上的乙醯膽鹼受體因自體免疫反應而引起的疾病。重症肌無 力病患其骨骼肌受到影響，而自律神經系統同樣以乙醯膽鹼作為神經傳遞物質，但因其受 體與骨骼肌受體不同而仍能正常運作。下列哪些生理反應在重症肌無力患者身上可能受到 影響，導致其反應較正常人遲緩？", "options": {"A": "轉動眼球，以追蹤移動中物體的能力", "B": "以木槌敲擊膝蓋時，所產生的膝跳反射動作", "C": "受驚嚇時，瞳孔放大、心搏速率上升的現象", "D": "溫度太低時，骨骼肌收縮顫抖產生熱能的能力", "E": "緊張時，腸胃蠕動受抑制，造成消化不良的現象"}, "answer": ["A", "B", "D"], "expl": "(C) 瞳孔放大、心搏速率上升與 (E) 腸胃蠕動的抑制著受交感神經系統調節，為自\n律神經系統，其乙醯膽鹼受體不受自體免疫反應影響。", "cross": false}, {"id": "F114-18", "year": 114, "no": 18, "ch": "選Ⅳ 生態與演化", "chn": 4, "topic": "演替（消長）的種類、能量的流轉與元素的循環、生物多樣性", "diff": "中偏易", "section": "分科", "kind": "multi", "stem": "某同學自行研讀教科書，做群集和生態系的章節課程預習之後，作出以下的整理。哪些說 法正確？", "options": {"A": "初級演替（消長）與次級演替的最大差別，就是有沒有火災的發生", "B": "維持生態系運作主要動力的太陽輻射能，是經由異營細菌吸收而來", "C": "根據能量塔的轉移效益，可以將較複雜的食物網拆解成數條交錯的食物鏈", "D": "目前地球生態系的碳循環和氮循環，曾受工業革命的影響而改變", "E": "生態系的物種豐富度受當地氣象、地理位置、地形的複雜度所影響"}, "answer": ["C", "D", "E"], "expl": "(A) 初級演替（消長）為某地區初次有生物群集加入、並隨時間改變群集結構；若\n某地區曾經有生物群集存在而再次啟動群集結構的改變，稱為次級演替。 (B) 自營\n生物才能吸收太陽輻射能轉化為異營生物可利用的能量形式。", "cross": false}, {"id": "F114-19", "year": 114, "no": 19, "ch": "生物(全) 基礎", "chn": 0, "topic": "生物分類系統的演進", "diff": "中偏易", "section": "分科", "kind": "multi", "stem": "有關生物分類系統的敘述，下列哪些正確？", "options": {"A": "林奈考慮了生物源自共同祖先的概念，創立兩界的分類系統", "B": "五界說的提出後，導致生物學界廢除林奈的層級分類系統", "C": "顯微鏡解析度陸續進步的結果，是導致分類系統演變的原因之一", "D": "五界說和六界說的差異，是因為某些生物細胞沒有粒線體", "E": "三域的分類系統之所以能夠建立，是基於生物細胞核糖體 RNA 序列的相似性"}, "answer": ["C", "E"], "expl": "(A) 林奈支持神創說，不認同共同祖先的概念。 (B) 五界說提出後，生物學界仍持\n續使用林奈的層級分類系統並加以精進。 (D) 六界說把古細菌獨立為古菌界，和\n真細菌一樣都沒有粒線體，所以並非「粒線體有無」的差異，而是核糖體 RNA \n序列與細胞壁成分等差異的存在。", "cross": false}, {"id": "F114-20", "year": 114, "no": 20, "ch": "選Ⅰ 細胞與遺傳", "chn": 1, "topic": "表觀遺傳學對基因表現的影響", "diff": "中", "section": "分科", "kind": "multi", "stem": "下列有關本文的敘述，哪些正確？", "options": {"A": "表觀遺傳學與造成蜜蜂社會階級差異無關", "B": "蜂后的基因表現與雄蜂及工蜂有所不同", "C": "基因體 DNA 序列可因行為不同而改變", "D": "本研究證明 Dnmt3 是蜂王漿的主要成分", "E": "蜂后和工蜂的卵巢發育不一樣"}, "answer": ["B", "E"], "expl": "(A) 甲基化酵素的表現量影響卵巢的發育，故表觀遺傳學的確會影響蜜蜂社會階\n級。 (C) 文章中未提到基因體序列改變，僅提到表觀遺傳學對基因表現的影響。\n (D) Dnmt3 為 DNA 甲基化酵素，並非蜂王漿的成分。", "cross": false}, {"id": "F114-21", "year": 114, "no": 21, "ch": "選Ⅰ 細胞與遺傳", "chn": 1, "topic": "RNA 干擾技術對蛋白質修飾的影響", "diff": "中偏易", "section": "分科", "kind": "single", "stem": "為測試本文中假說使用 RNA 干擾技術的目的為何？", "options": {"A": "提升 Dnmt3 的 mRNA 表現", "B": "降低蜂王漿的產量", "C": "改變照護蜜蜂的餵食行為", "D": "降低 Dnmt3 的蛋白質產量"}, "answer": ["D"], "expl": "(A) RNA 干擾技術使蜜蜂無法表現足量的 Dnmt3。文章中未提到 RNA 干擾技術\n改變 (B) 蜂王漿的產量，也未提到 (C) 改變照護蜜蜂的餵食行為。", "cross": false}, {"id": "F114-22", "year": 114, "no": 22, "ch": "選Ⅰ 細胞與遺傳", "chn": 1, "topic": "表觀遺傳學對基因表現的影響", "diff": "中偏易", "section": "分科", "kind": "single", "stem": "有關蜜蜂幼蟲攝食蜂王漿的敘述，下列何者正確？", "options": {"A": "會直接造成基因體序列突變", "B": "會抑制卵巢發育", "C": "會影響基因表現", "D": "會造成組蛋白降解"}, "answer": ["C"], "expl": "(A) 基因體序列未發生突變。 (B) 卵巢可正常發育。 (D) 文章未說明組蛋白是否降解，\n僅提到組蛋白乙醯化受到影響。", "cross": false}, {"id": "F114-23", "year": 114, "no": 23, "ch": "選Ⅲ 動物構造與生理", "chn": 3, "topic": "膜電位改變與神經訊息的傳遞", "diff": "中偏易", "section": "分科", "kind": "single", "stem": "根據以上文字，推測光敏感離子通道蛋白應該位於綠藻細胞的哪一種構造上？", "options": {"A": "細胞核", "B": "葉綠體", "C": "細胞膜", "D": "粒線體"}, "answer": ["C"], "expl": "文章中提到膜電位產生變化，可推測該光敏感離子通道位於細胞膜上。", "cross": false}, {"id": "F114-24", "year": 114, "no": 24, "ch": "選Ⅲ 動物構造與生理", "chn": 3, "topic": "膜電位改變與神經訊息的傳遞", "diff": "中偏易", "section": "分科", "kind": "single", "stem": "利根川進教授團隊的實驗中，以光刺激開啟光敏感離子通道的處理，對應了正常情況下記 憶生成時，神經訊號傳導過程中的哪一個事件？", "options": {"A": "感覺受器接受物理性或化學性外來刺激，改變感覺神經的膜電位", "B": "中樞神經細胞接受上游神經傳遞物質刺激，使細胞膜去極化，誘發動作電位", "C": "動作電位沿中樞神經纖維進行跳躍式傳導", "D": "動作電位抵達神經末梢，不經過突觸直接釋放神經傳遞物質"}, "answer": ["B"], "expl": "(B) 「光刺激光敏感離子通道」使其蛋白質構型改變、打開離子通道讓陽離子通\n過，使細胞膜去極化而改變膜電位。", "cross": false}, {"id": "F114-25", "year": 114, "no": 25, "ch": "選Ⅲ 動物構造與生理", "chn": 3, "topic": "膜電位改變與神經訊息的傳遞", "diff": "中偏易", "section": "分科", "kind": "single", "stem": "表 2 顯示某種細胞內外可自由流動的不同陽離子濃度，若想以光遺傳技術導致細胞產生過 極化，來抑制神經活性，則此光敏感離子通道應只能讓下列哪種離子通過？ 表 2 陽離子種類 細胞質內濃度 細胞外濃度 鈉離子 Na ＋ 15 mM 150 mM 鎂離子 Mg2＋ 0.5～1.2 mM 0.5～1.5 mM 鉀離子 K ＋ 150 mM 5 mM 鈣離子 Ca2＋ 50～100 nM 1.2 mM", "options": {"A": "鈉離子", "B": "鎂離子", "C": "鉀離子", "D": "鈣離子"}, "answer": ["C"], "expl": "光敏感離子通道打開後可讓陽離子通過以改變膜電位。鈉離子、鈣離子都是胞\n外濃度＞胞內濃度，通道打開後會使膜電位上升，細胞去極化；鎂離子的胞外\n濃度≒胞內濃度，膜電位改變可能不明顯；鉀離子的胞外濃度＜胞內濃度，通\n道打開後膜電位下降，細胞過極化。故選 (C) 。", "cross": false}, {"id": "F114-26", "year": 114, "no": 26, "ch": "選Ⅰ 細胞與遺傳", "chn": 1, "topic": "密碼子與胺基酸", "diff": "中偏難", "section": "分科", "kind": "multi", "stem": "下列有關 1961 年尼倫伯格的實驗敘述，哪些正確？", "options": {"A": "哺乳動物細胞不具有可進行上文實驗的關鍵物質", "B": "若將細胞萃取物進行 95 ℃ 加熱，可以讓實驗產出的放射線訊號加強", "C": "若要證實 poly-U 含的密碼子只會對應 Phe，則必須要進行至少 20 次的實驗", "D": "若加入核糖核酸分解酶（RNase），本實驗仍可以順利進行", "E": "若加入蛋白質分解酶（Protease），本實驗則無法順利進行 19 生物"}, "answer": ["C", "E"], "expl": "(A) 哺乳動物細胞也具有 mRNA、tRNA 與核糖體，故也可進行同樣的實驗。 (B) 將\n細胞萃取物加熱至 95 ℃可能會破壞轉譯相關的酵素之活性，影響放射線訊號。\n (C) 胺基酸總共有 20 種，故要進行 20 次實驗才可確定密碼子是否只對應特定胺\n基酸。 (D) 核糖核酸分解酶會分解 RNA，使轉譯主要的工具都失去功能，可能導\n致實驗失敗。 (E) 蛋白質分解酶可分解蛋白質，但不影響轉譯相關的 RNA 功能，\n故實驗應仍能順利進行。", "cross": false}, {"id": "F114-27", "year": 114, "no": 27, "ch": "選Ⅰ 細胞與遺傳", "chn": 1, "topic": "密碼子與胺基酸", "diff": "中偏難", "section": "分科", "kind": "single", "stem": "有關尼倫伯格利用表 3 材料進行實驗之敘述，下列何者正確？", "options": {"A": "材料甲是由 A、U、C、G 進行排列，應有 64 種組合", "B": "反應中可一次加入多種材料丁與其他材料進行測試", "C": "材料甲與材料丁在沒有材料乙的情況下，可保留在濾膜戊上", "D": "材料甲與材料丁若可相對應，就不會與材料乙結合"}, "answer": ["A"], "expl": "(A) 三個核苷酸的短鏈 mRNA 有 64 種組合。 (B) 一次加入多種材料丁（帶有胺基酸\n的 tRNA）將無法確認是和哪一種材料甲（mRNA）結合。 (C) 沒有材料乙（核糖\n體），材料甲（mRNA）和材料丁（帶有胺基酸的 tRNA）無法結合形成轉譯複\n合體，不會留在濾膜上。 (D) 材料甲（mRNA）和材料丁（帶有胺基酸的 tRNA）\n即使可對應，仍需要材料乙（核糖體）才能結合在一起形成轉譯複合體。", "cross": false}, {"id": "F114-28", "year": 114, "no": 28, "ch": "選Ⅰ 細胞與遺傳", "chn": 1, "topic": "密碼子與胺基酸", "diff": "中偏易", "section": "分科", "kind": "single", "stem": "承上題，在所有材料甲與材料丁的組合都完成實驗後，尼倫伯格在結論中提及：有些迷你 mRNA 並不對應到任何一種材料丁。對於此現象，下列敘述何者正確？", "options": {"A": "此類迷你 mRNA 至少有 5 種", "B": "證明多種密碼子對應同一種胺基酸", "C": "上述迷你 mRNA 可能扮演轉譯終止訊號", "D": "核糖體與其反應後變小而無法偵測到"}, "answer": ["C"], "expl": "(A) 終止密碼子已知有 3 種。 (B) 文本的結論並未提及多種密碼子對應同一種胺基\n酸。 (C) 這些迷你 mRNA 的密碼子即今日所稱之「終止密碼子」。 (D) 迷你 mRNA \n並不會在反應後變小。", "cross": false}, {"id": "F114-29", "year": 114, "no": 29, "ch": "選Ⅱ 植物", "chn": 2, "topic": "葉的構造與功能", "diff": "中偏易", "section": "分科", "kind": "single", "stem": "圖 5 為某植物葉片的永久切片，由其構造推測這 葉片來自何種植物？", "options": {"A": "浮葉植物，因為氣孔分布在上表皮", "B": "陸生植物，因為維管束有明顯的厚細胞壁", "C": "沉水植物，因為沒有氣孔", "D": "挺水植物，因為有發達的通氣組織"}, "answer": ["A"], "expl": "由葉的橫切面可見保衛細胞形成的氣孔多位於上表皮，下表皮不具氣孔，故可\n推測為 (A) 浮葉植物。", "cross": false}, {"id": "F114-30", "year": 114, "no": 30, "ch": "選Ⅲ 動物構造與生理", "chn": 3, "topic": "腎的外觀、腎元的構造與位置", "diff": "易", "section": "分科", "kind": "single", "stem": "某生想製備組織切片，以利用顯微鏡觀察腎小體的構造。圖 6 為豬腎臟 縱切剖面，該生應該取哪一部分的薄片來製作玻片標本？", "options": {"A": "甲", "B": "乙", "C": "丙", "D": "丁"}, "answer": ["D"], "expl": "除部分近髓質腎元有較長的亨耳環管進入腎臟髓質（丙），多數腎元的腎小體\n（鮑氏囊、絲球體與腎小管）均在腎臟皮質（丁）中，故選 (D) 。", "cross": false}, {"id": "F114-31", "year": 114, "no": 31, "ch": "選Ⅲ 動物構造與生理", "chn": 3, "topic": "小腸的收縮與肌肉組織的分布", "diff": "易", "section": "分科", "kind": "single", "stem": "以顯微鏡觀察小腸的橫切面永久玻片，可見到小腸壁平滑肌組織的切面方向為何？", "options": {"A": "呈橫切面", "B": "呈縱切面", "C": "橫切面與縱切面均有", "D": "平滑肌的切面無規則"}, "answer": ["C"], "expl": "小腸會進行「蠕動」以推送食物與「分節運動」以攪拌混合食物，具有環形與\n縱向分布的平滑肌肉組織，故永久玻片上應可見到橫切面與縱切面的平滑肌。", "cross": false}, {"id": "F114-32", "year": 114, "no": 32, "ch": "選Ⅰ 細胞與遺傳", "chn": 1, "topic": "生物組織中常見有機物的檢測", "diff": "中偏易", "section": "分科", "kind": "single", "stem": "有關檢測生物組織中的還原醣、脂肪及蛋白質等成分的實驗敘述，下列何者正確？", "options": {"A": "本氏液可用來檢測樣品中是否含有澱粉的成分", "B": "本氏液與葡萄糖水混合後隔水加熱，在液體中可以檢測出氧化亞銅（Cu2O）的存在", "C": "油性椒紅素試劑，會因愈多脂肪而愈無法染色，進而有橘紅色沉澱物析出", "D": "雙縮脲試劑中的銅離子會與蛋白質的雙硫鍵作用，而產生帶有紫色的硫酸銅沉澱"}, "answer": ["B"], "expl": "(A) 本氏液用來檢驗樣品中是否有還原醣。 (C) 椒紅素試劑會被脂肪吸附，故脂肪\n愈多染色愈明顯。 (D) 雙縮脲試劑的銅離子可和蛋白質的肽鍵作用，產生紫色錯\n合物。", "cross": false}, {"id": "F114-33", "year": 114, "no": 33, "ch": "選Ⅲ 動物構造與生理", "chn": 3, "topic": "蛙的外部形態與內在構造的觀察", "diff": "中偏易", "section": "分科", "kind": "single", "stem": "青蛙常以舌捕食昆蟲。圖 7 為青蛙頭部側面圖。青蛙的舌根位於圖中的何處？", "options": {"A": "甲", "B": "乙", "C": "丙", "D": "丁"}, "answer": ["C"], "expl": "蛙的舌根位於下顎內緣，可在口張開時伸出黏住獵物後回捲以協助其捕食。", "cross": false}, {"id": "F114-34", "year": 114, "no": 34, "ch": "選Ⅱ 植物", "chn": 2, "topic": "植物組織的構造形態與功能", "diff": "中偏易", "section": "分科", "kind": "multi", "stem": "圖 8 為利用顯微鏡所觀察到的甲、乙兩種植物木質部組織。下列敘 述哪些正確？", "options": {"A": "乙細胞只存在松柏類植物", "B": "甲細胞上下之間交接處的細胞壁形成穿孔", "C": "乙細胞負責輸送養分", "D": "乙細胞兩端尖，兩細胞間以壁孔運輸", "E": "甲、乙均可行有絲分裂，增加細胞數量"}, "answer": ["B", "D"], "expl": "(A) 乙（假導管、管胞）在蕨類植物、裸子植物及被子植物均存在。 (C) 乙（假導\n管、管胞）為木質部的一員，協助運輸水分與無機鹽。 (E) 甲（導管）和乙（假導\n管、管胞）在成熟有運輸功能後均已死亡，無法再行有絲分裂增加細胞數量。", "cross": false}, {"id": "F114-35", "year": 114, "no": 35, "ch": "選Ⅳ 生態與演化", "chn": 4, "topic": "生態系的組成與營養階層、能量流轉、元素循環", "diff": "中偏易", "section": "分科", "kind": "multi", "stem": "觀察如圖 9 的生態球，只看到一個密封透明的玻璃容器中，約有十分 之九的水，十分之一的空氣，幾枝枯枝，容器底部有些貝殼砂，清澈 的水中兩隻小蝦悠游其中。這樣密閉的生態球需放在光亮且涼爽的地 方，不需要打開透氣，也不需要另外餵食，這兩隻小蝦可以存活一段 相當長的時間。下列與此生態球相關的敘述，哪些正確？", "options": {"A": "此球為密閉的生態系統，不需要外界提供能量", "B": "水中小蝦為消費者", "C": "此生態球中只有兩隻小蝦，不需要分解者", "D": "此生態球中，應該有行光合作用的微型生物", "E": "在此生態球中，完全藉由微生物進行化學自營提供能量"}, "answer": ["B", "D"], "expl": "(A) 此生態球由透明玻璃容器構成，陽光可穿透，故仍可從外界獲得能量。 (C) 小蝦\n的代謝廢物或脫殼等生物碎屑仍需要分解者協助分解以完成元素的循環。 (D) (E) 題\n幹提到此生態球需放在光亮且涼爽處，故可推測內部微生物行光合自營提供能\n量。", "cross": false}, {"id": "F114-36", "year": 114, "no": 36, "ch": "選Ⅲ 動物構造與生理", "chn": 3, "topic": "圖表判讀、體液免疫與抗體的專一性", "diff": "中偏難", "section": "分科", "kind": "single", "stem": "下列何種抗體，最適合進一步的開發成檢測該特定病原體甲細菌的試劑？", "options": {"A": "抗體 A", "B": "抗體 B", "C": "抗體 C", "D": "抗體 D"}, "answer": ["C"], "expl": "四種抗體檢測病牛與健康牛的唾液樣本來源後，僅抗體 B、抗體 C、抗體 D 有\n差異；抗體 B 對甲細菌的毒素 X 與乙細菌的毒素 Y 均有反應，無法篩檢病牛\n唾液存在哪一種細菌；抗體 D 對甲細菌的毒素 X 與外膜蛋白有反應，但唾液樣\n本顯示病牛無、健康牛有，無法用來篩檢病牛是否有甲細菌；抗體 C 僅對甲細\n菌的外膜蛋白有反應，且唾液樣本顯示病牛有、健康牛無，因此可以作為篩檢\n病牛是否有甲細菌存在的抗體，故選 (C) 。", "cross": false}, {"id": "F114-38", "year": 114, "no": 38, "ch": "選Ⅱ 植物", "chn": 2, "topic": "圖表判讀、植物激素對植物生長發育的影響", "diff": "中偏難", "section": "分科", "kind": ": false}, {"id": "F112-42", "year": 112, "no": 42, "ch": "選Ⅲ 動物構造與生理", "chn": 3, "topic": "學生能熟習各種感覺受器的知識內容", "diff": "易", "section": "分科", "kind": "open", "stem": "哪一種化學受器是特化的神經細胞，可接受外在環境中化學物質的刺激？（2 分）", "options": {}, "answer": [], "expl": "能感受化學物質刺激的感覺有味覺和嗅覺。味覺受器為特化的上皮細胞（味細\n胞），嗅覺受器為嗅神經的樹突（嗅毛）。", "cross": false}, {"id": "F112-43", "year": 112, "no": 43, "ch": "選Ⅲ 動物構造與生理", "chn": 3, "topic": "學生能熟習各種感覺受器的知識內容", "diff": "易", "section": "分科", "kind": "open", "stem": "請寫出人類眼睛與彩色視覺相關，可以偵測特定波長範圍光線的光受器名稱。（2 分）", "options": {}, "answer": [], "expl": "眼睛中與視覺相關的受器有兩種：視桿細胞和視錐細胞。視錐細胞因可感受的\n光線波長範圍不同可再分成三種：紅光、綠光、藍光，構成人類的彩色視覺。", "cross": false}, {"id": "F112-44", "year": 112, "no": 44, "ch": "選Ⅰ 細胞與遺傳", "chn": 1, "topic": "圖表判讀。學生能根據圖表判斷病毒感染前後的差異", "diff": "中", "section": "分科", "kind": "open", "stem": "根據圖 11 甲與圖 11 乙，描述 CHK1 在病毒感染後的 CHK1 蛋白質表現量有何變化？（2 分）", "options": {}, "answer": [], "expl": "題圖 11 中，甲、乙分別為 CHK1 的 mRNA 含量、CHK1 的蛋白質含量隨病毒感\n染後的時間變化。可見 CHK1 蛋白質在病毒感染一小時後與未感染前相比較已\n減少許多，感染 24 小時已幾乎無法檢測到 CHK1 蛋白質；但 CHK1 的 mRNA \n則無明顯減少，推測病毒的感染應主要影響 CHK1 蛋白質的轉譯過程。", "cross": false}, {"id": "F112-46", "year": 112, "no": 46, "ch": "選Ⅰ 細胞與遺傳", "chn": 1, "topic": "學生能熟習赫希和蔡斯的噬菌體實驗內容與發現。", "diff": "易", "section": "分科", "kind": "open", "stem": "赫希和蔡斯以何種放射性同位素標定噬菌體的蛋白質分子？（2 分）", "options": {}, "answer": [], "expl": "DNA 的組成元素：C、H、O、N、P；蛋白質的組成元素：C、H、O、N、S。\n若要觀察蛋白質分子，應以 S 的放射性同位素為目標以利區別。", "cross": false}, {"id": "F112-47", "year": 112, "no": 47, "ch": "選Ⅰ 細胞與遺傳", "chn": 1, "topic": "學生能熟習赫希和蔡斯的噬菌體實驗內容與發現", "diff": "中", "section": "分科", "kind": "open", "stem": "以果汁機攪拌的目的為何？（2 分）", "options": {}, "answer": [], "expl": "果汁機攪拌的剪力可打斷噬菌體和細菌之間的連繫，配合接下來的離心，即可\n分離噬菌體（上清液）和細菌（沉澱物）。", "cross": false}, {"id": "F113-37", "year": 113, "no": 37, "ch": "選Ⅰ 細胞與遺傳", "chn": 1, "topic": "連鎖與互換、孟德爾遺傳法則", "diff": "易", "section": "分科", "kind": "open", "stem": "若僅考慮孟德爾與摩根所提出的遺傳法則，則一植物若其控制兩個不同性狀的兩個基因皆 為異型合子，試交後其子代的所有表現型比例為 965：944：206：185，而非孟德爾遺傳法 則預期的 9：3：3：1，其原因為何？（2 分）", "options": {}, "answer": [], "expl": "  46, "ch": "選Ⅲ 動物構造與生理", "chn": 3, "topic": "周圍神經系統", "diff": "易", "section": "分科", "kind": "open", "stem": "男性的生殖生理作用受神經系統控制。當性衝動時陰莖受哪一神經系統控制而勃起？（2 分）", "options": {}, "answer": [], "expl": "副交感神經控制勃起，交感神經控制射精。", "cross": false}, {"id": "F113-47", "year": 113, "no": 47, "ch": "選Ⅱ 植物", "chn": 2, "topic": "向光性、生長素", "diff": "易", "section": "分科", "kind": "open", "stem": "圖 13 標示有甲至丁等四處，如果要讓植物莖不往右邊生長，雲母片需要插在何處？（2 分）", "options": {}, "answer": [], "expl": "生長素由莖頂分生組織分泌。照光側（乙處）的分泌受到抑制，生長素濃度低；\n背光側（甲處）不受抑制，生長素濃度正常。若不插入雲母片，背光側生長較\n快，會使植物莖往右生長，因此若要防止植物莖往右生長，可在甲處插入雲母\n片，阻擋生長素向下運輸，使兩側的生長速度一致。", "cross": false}, {"id": "F113-48", "year": 113, "no": 48, "ch": "選Ⅱ 植物", "chn": 2, "topic": "向地性、生長素", "diff": "易", "section": "分科", "kind": "open", "stem": "若將雲母片插在丙處，卻無法改變丁處莖的生長方向。說明發生這個現象的原因為何？（ 2 分）", "options": {}, "answer": [], "expl": "植物細胞內的平衡石受重力影響分布於近地側，促進生長素累積，使近地側生\n長素濃度較高。高濃度的生長素會促進莖的生長，故丁側細胞體積較大。雲母\n片插於丙側會阻擋生長素自莖頂向下運輸，反而使丙側的生長素濃度更低，導\n致丙、丁兩側的細胞體積差異更大，負的向地性更明顯。", "cross": false}, {"id": "F113-49", "year": 113, "no": 49, "ch": "選Ⅱ 植物", "chn": 2, "topic": "向地性、生長素", "diff": "易", "section": "分科", "kind": "open", "stem": "根據研究發現生長點前方細胞的平衡石會影響 IAA 的分布，試問植物根哪一部位的細胞含 有平衡石？（2 分）", "options": {}, "answer": [], "expl": "根冠的平衡石影響根尖生長點的生長素（IAA）分泌。", "cross": false}, {"id": "F114-37", "year": 114, "no": 37, "ch": "選Ⅲ 動物構造與生理", "chn": 3, "topic": "圖表判讀、體液免疫與抗體的專一性", "diff": "中偏易", "section": "分科", "kind": "open", "stem": "上述檢測法是利用後天性免疫的何種特性？（2 分）", "options": {}, "answer": [], "expl": "抗體的變異區和特定抗原進行專一性結合。變異區和抗原若不吻合將無法有抗\n體－抗原複合體出現。", "cross": false}, {"id": "F114-39", "year": 114, "no": 39, "ch": "選Ⅱ 植物", "chn": 2, "topic": "圖表判讀、植物激素對植物生長發育的影響", "diff": "中偏難", "section": "分科", "kind": "open", "stem": "根據圖 10 的研究結果，可以推測 LOG 蛋白質在植物體中的功能為何？（2 分）", "options": {}, "answer": [], "expl": "圖 10 顯示，經過足量濃度 BA 的刺激，突變株的形態愈來愈接近野生型，可判斷 \nLOG 蛋白應和 BA 的效果相當，能促進珠芽杯的形成與葉狀體維持正常形態。", "cross": false}, {"id": "F114-42", "year": 114, "no": 42, "ch": "選Ⅰ 細胞與遺傳", "chn": 1, "topic": "圖表判讀、遺傳物質成分的確認、膠體電泳、病毒", "d const $=s=>document.querySelector(s);
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function pct(a,b){return b?Math.round(a/b*100):0}
function ansStr(q){return (q.answer||[]).slice().sort().join('')}
function optKeys(q){const k=Object.keys(q.options||{});return k.length?k:['A','B','C','D','E'];}
function markAns(q,pick){        // pick: 排序後字串, 如 "A" 或 "AC"
  const ok = pick===ansStr(q);
  const prev=S.rec[q.id];
  const firstCorrect = ok && !(prev&&prev.correct);   // 首次答對才給忍者經驗(防重刷)
  S.rec[q.id]={correct:ok,n:(prev?.n||0)+1};
  const set=new Set(S.wrong);
  if(ok) set.delete(q.id); else set.add(q.id);
  S.wrong=[...set]; save();
  if(firstCorrect) Ninja.gain(10,NINJA_APP,{correct:1});
  return ok;
}

   <div class="picker">
     ${YEARS.map(y=>`<button class="pbtn" onclick="startExam(${y})">${y} 年<small>分科 ${usableR.filter(q=>q.year===y).length} 題</small></button>`).join('')}
   </div>
   <div class="sect">📚 章節練習（作答後看解析）</div>
   <div class="modes">
     ${CHAPTERS.map(c=>`<button class="mode" onclick="startChapter('${esc(c)}')"><div class="mi">${CI(c)}</div><div class="mt">${esc(c)}</div><div class="md">${usableR.filter(q=>q.ch===c).length} 題</div></button>`).join('')}
   </div>
   <div class="sect">🎯 專項練習</div>
   <div class="modes">
     <button class="mode" onclick="startMulti()"><div class="mi">☑️</div><div class="mt">多選題特訓</div><div class="md">${usableR.filter(q=>q.kind==='multi').length} 題 · 應選N項</div></button>
     <button class="mode" onclick="startWrongPractice()"><div class="mi">🔁</div><div class="mt">錯題複習</div><div class="md">${S.wrong.length} 題待清</div></button>
     <button class="mode" onclick="startFav()"><div class="mi">⭐</div><div class="mt">我的收藏</div><div class="md">${S.fav.length} 題 · 重點再練</div></button>
   </div>
   ${NC.length?`<div class="sect">✍️ 混合題／非選</div>
   <button class="mode wide" onclick="go('nonchoice')"><div class="mi">✍️</div><div><div class="mt">非選擇題・參考答案與詳解</div><div class="md">${NC.length} 題歷屆混合題（無法自動批改，附官方式詳解）</div></div></button>`:''}
   <div class="sect">📊 診斷</div>
   <button class="mode wide" onclick="go('diagnose')"><div class="mi">📈</div><div><div class="mt">弱點診斷</div><div class="md">看各章節／各年答對率，一鍵補強最弱項</div></div></button>
   <p style="text-align:center;color:var(--sub);font-size:.7rem;margin-top:18px">${esc(QB.meta.source)} · 離線可用 · 進度存本機</p>`;
}

/* ---------- session engine ---------- */
let sess=null;
function startExam(y){
  const list=usableR.filter(q=>q.year===y).sort((a,b)=>a.no-b.no);
  sess={list,i:0,mode:'exam',picks:{},sel:[],timed:true,t0:Date.now(),title:`${y} 年 · 整卷模擬`};
  startTimer(); go('run'); drawRun();
}
function startChapter(c){
  const list=shuffle(usableR.filter(q=>q.ch===c));
  sess={list,i:0,mode:'practice',picks:{},sel:[],timed:false,title:`章節練習 · ${c}`};
  go('run'); drawRun();
}
function startMulti(){
  const list=shuffle(usableR.filter(q=>q.kind==='multi'));
  sess={list,i:0,mode:'practice',picks:{},sel:[],timed:false,title:'多選題特訓'};
  go('run'); drawRun();
}
function startWrongPractice(){
  if(!S.wrong.length){alert('目前沒有錯題，先去練習吧！');return;}
  const set=new Set(S.wrong);
  const list=shuffle(usableR.filter(q=>set.has(q.id)));
  sess={list,i:0,mode:'practice',picks:{},sel:[],timed:false,title:'錯題複習'};
  go('run'); drawRun();
}
function startFav(){
  if(!S.fav.length){alert('還沒有收藏題目。作答時點右上角 ⭐ 就會收藏。');return;}
  const set=new Set(S.fav);
  const list=shuffle(usableR.filter(q=>set.has(q.id)));
  sess={list,i:0,mode:'practice',picks:{},sel:[],timed:false,title:'我的收藏'};
  go('run'); drawRun();
}
const DAILY_N=12;
function startDaily(){
  const wrongSet=new Set(S.wrong);
  const wrong=usableR.filter(q=>wrongSet.has(q.id));
  const unseen=usableR.filter(q=>!S.rec[q.id]&&!wrongSet.has(q.id));
  const seen=usableR.filter(q=>S.rec[q.id]&&!wrongSet.has(q.id));
  const list=[...shuffle(wrong).slice(0,5),...shuffle(unseen),...shuffle(seen)].slice(0,DAILY_N);
  if(!list.length){alert('題目都練完了，太厲害了！');return;}
  sess={list:shuffle(list),i:0,mode:'practice',picks:{},sel:[],timed:false,title:'每日一練',daily:true};
  go('run'); drawRun();
}
let timerId=null;
function startTimer(){ stopTimer(); timerId=setInterval(()=>{const el=$('#timer');if(el)el.textContent=fmtT(Date.now()-sess.t0)},1000); }
function stopTimer(){ if(timerId)clearInterval(timerId); timerId=null; }
function fmtT(ms){const s=Math.floor(ms/1000);return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}

function drawRun(){
  const q=sess.list[sess.i]; if(!q){finish();return;}
  const picked=sess.picks[q.id];
  const answered=picked!=null;
  const multi=q.kind==='multi';
  const keys=optKeys(q);
  const hasText=Object.keys(q.options||{}).length>0;
  const tag=`<span class="tag">${CI(q.ch)} ${esc(q.ch)}</span>${multi?'<span class="tag multi">☑️ 多選</span>':''}${q.cross?'<span class="tag cross">跨科</span>':''}${diffTag(q)}`;
  const stem = q.stem ? `<div class="stem">${esc(q.stem)}</div>` : '';
  const sel = answered ? picked.split('') : (sess.sel||[]);
  // 延後對答：作答期間只反白選取，不顯示對錯與解析（交卷後才逐題看）
  const opts=keys.map(k=>{
    const v=(q.options||{})[k];
    const cls='opt'+(sel.includes(k)?' sel':'');
    const label = hasText ? `<span class="v">${esc(v)}</span>` : `<span class="v" style="color:var(--sub)">（見上圖選項 ${k}）</span>`;
    return `<button class="${cls}" onclick="pick('${k}')"><span class="k">${k}</span>${label}</button>`;
  }).join('');
  const hint = multi?`<div class="hint">☑️ 多選題：可複選${q.answer.length?'（應選 '+q.answer.length+' 項）':''}，選好直接按下一題</div>`:'';
  const last=sess.i+1>=sess.list.length;
  $('#v-run').innerHTML=`
    <div style="display:flex;align-items:center">
      <button class="back" onclick="quitRun()" style="flex:1;text-align:left">‹ 結束</button>
      <button class="iconbtn${isFav(q.id)?' faved':''}" id="favBtn" onclick="toggleFav('${q.id}')" title="收藏">★</button>
    </div>
    <div class="qhead">
      <div class="prog"><i style="width:${(sess.i+1)/sess.list.length*100}%"></i></div>
      <div class="cnt">${sess.i+1}/${sess.list.length}</div>
      ${sess.timed?`<div class="timer" id="timer">${fmtT(Date.now()-sess.t0)}</div>`:''}
    </div>
    <div style="font-weight:800;font-size:.8rem;color:var(--sub);margin-bottom:8px">${esc(sess.title)}　·　${q.year}年第${q.no}題</div>
    <div>${tag}</div>${ctxHtml(q)}${stem}${imgHtml(q)}
    ${hint}
    <div class="opts">${opts}</div>
    <div class="foot"><div class="in">
      ${sess.i>0?'<button class="btn ghost" onclick="prevQ()">‹ 上一題</button>':''}
      <button class="btn" id="nextBtn" onclick="nextQ()">${last?'交卷／看解析 ✓':(answered?'下一題 ›':'先跳過 ›')}</button>
    </div></div>`;
}
function pick(k){
  const q=sess.list[sess.i];
  if(q.kind==='multi'){
    const s=new Set(sess.sel||[]); s.has(k)?s.delete(k):s.add(k); sess.sel=[...s];
    if(sess.sel.length) sess.picks[q.id]=sess.sel.slice().sort().join(''); else delete sess.picks[q.id];
  } else {
    sess.picks[q.id]=k;
  }
  drawRun();
}
function syncSel(){ const q=sess.list[sess.i]; sess.sel=(q.kind==='multi'&&sess.picks[q.id]!=null)?sess.picks[q.id].split(''):[]; }
function nextQ(){ if(sess.i+1<sess.list.length){sess.i++;syncSel();drawRun();}else finish(); }
function prevQ(){ if(sess.i>0){sess.i--;syncSel();drawRun();} }
function quitRun(){ if(Object.keys(sess.picks).length&&!confirm('離開會結束這次練習，作答不會計入，確定？'))return; stopTimer(); go('home'); }

function finish(){
  stopTimer();
  sess.list.forEach(q=>{ if(sess.picks[q.id]!=null) markAns(q,sess.picks[q.id]); });
  if(sess.daily && Object.keys(sess.picks).length){ S.daily[todayStr()]=true; save(); }
  const list=sess.list, picks=sess.picks;
  const done=list.filter(q=>picks[q.id]!=null);
  const corr=done.filter(q=>picks[q.id]===ansStr(q));
  const byCh={};
  list.forEach(q=>{const t=q.ch;byCh[t]=byCh[t]||[0,0];if(picks[q.id]!=null){byCh[t][1]++;if(picks[q.id]===ansStr(q))byCh[t][0]++;}});
  const wrong=list.filter(q=>picks[q.id]==null||picks[q.id]!==ansStr(q));   // 未作答也列入檢討
  const right=list.filter(q=>picks[q.id]!=null&&picks[q.id]===ansStr(q));
  const timeStr = sess.timed?`<div class="chip">⏱ ${fmtT(Date.now()-sess.t0)}</div>`:'';
  $('#v-result').innerHTML=`
    <div class="result">
     <div class="big card">
       <div style="font-size:.85rem;color:var(--sub);font-weight:700">${esc(sess.title)}</div>
       <div class="score">${pct(corr.length,done.length)}<span style="font-size:1.2rem">分</span></div>
       <div style="font-weight:700">答對 ${corr.length} / ${list.length} 題 ${timeStr}</div>
     </div>
     <div class="card">
       <div class="sect" style="margin-top:0">各章節表現</div>
       ${Object.entries(byCh).map(([t,[c,n]])=>bar(CI(t)+' '+t,c,n)).join('')||'<div class="empty">—</div>'}
     </div>
     <div class="sect">📋 逐題解析（共 ${list.length} 題）</div>
     ${wrong.length?`<div class="revhd bad">❌ 答錯／未作答（${wrong.length}）</div>${wrong.map(q=>reviewItem(q,true)).join('')}`:'<div class="card" style="text-align:center;color:var(--good);font-weight:800">🎉 全部答對！</div>'}
     ${right.length?`<div class="revhd ok">✅ 答對（${right.length}）— 點開看解析</div>${right.map(q=>reviewItem(q,false)).join('')}`:''}
    </div>
    <div class="foot"><div class="in">
      <button class="btn ghost" onclick="go('home')">回首頁</button>
      ${wrong.filter(q=>picks[q.id]!=null).length?'<button class="btn" onclick="startWrongPractice()">複習錯題</button>':''}
    </div></div>`;
  go('result'); window.scrollTo(0,0);
}
function bar(label,c,n){
  const p=pct(c,n); const col=p>=80?'var(--good)':p>=60?'var(--gold)':'var(--bad)';
  return `<div class="bar"><div class="lb"><span>${esc(label)}</span><span>${c}/${n}（${p}%）</span></div><div class="track"><i style="width:${p}%;background:${col}"></i></div></div>`;
}
function reviewItem(q,wrong){
  const your=(sess.picks[q.id]||'').split('').join('、')||'（未作答）';
  const ans=ansStr(q).split('').join('、');
  const head=`<span class="tag">${esc(q.ch)}</span>${q.cross?'<span class="tag cross">跨科</span>':''}<span class="tag" style="color:var(--sub);background:var(--line)">${q.year}年第${q.no}題</span>`;
  const stem=esc(q.stem||('（圖表題）'));
  const body=`${imgHtml(q)}<div class="a">你的答案 <s>${esc(your)}</s>　正解 <b>${esc(ans)}</b></div>${q.expl?`<div class="expl">💡 ${esc(q.expl)}</div>`:''}`;
  if(wrong){
    return `<div class="rev-item"><div style="margin-bottom:5px">${head}</div><div class="q">${stem}</div>${body}</div>`;
  }
  return `<details class="rev-item ok"><summary>${stem}</summary><div style="margin:8px 0 5px">${head}</div>${body}</details>`;
}

/* ---------- diagnose ---------- */
function renderDiagnose(){
  const byCh={}, byYear={};
  R.forEach(q=>{const r=S.rec[q.id];if(!r)return;
    const t=q.ch; byCh[t]=byCh[t]||[0,0]; byCh[t][1]++; if(r.correct)byCh[t][0]++;
    byYear[q.year]=byYear[q.year]||[0,0]; byYear[q.year][1]++; if(r.correct)byYear[q.year][0]++;});
  const has=Object.keys(byCh).length;
  let weak=null,wp=101;
  Object.entries(byCh).forEach(([t,[c,n]])=>{if(n>=3){const p=pct(c,n);if(p<wp){wp=p;weak=t}}});
  $('#v-diagnose').innerHTML=`
    <div class="sect" style="margin-top:6px">📊 弱點診斷</div>
    ${!has?'<div class="empty">還沒有作答紀錄。先去練幾題，這裡就會顯示你各章節／各年的答對率。</div>':`
    <div class="card"><div class="sect" style="margin-top:0">依章節</div>
      ${CHAPTERS.filter(t=>byCh[t]).map(t=>bar(CI(t)+' '+t,byCh[t][0],byCh[t][1])).join('')}</div>
    <div class="card"><div class="sect" style="margin-top:0">依年度</div>
      ${YEARS.filter(y=>byYear[y]).map(y=>bar(y+' 年',byYear[y][0],byYear[y][1])).join('')}</div>
    ${weak?`<button class="mode wide" onclick="startChapter('${esc(weak)}')"><div class="mi">💪</div><div><div class="mt">補強最弱：${esc(weak)}（${wp}%）</div><div class="md">點我專練這個章節</div></div></button>`:''}`}`;
}

/* ---------- wrong ---------- */
function renderWrong(){
  const set=new Set(S.wrong);
  const list=R.filter(q=>set.has(q.id));
  $('#v-wrong').innerHTML=`
    <div class="sect" style="margin-top:6px">🔁 錯題本（${list.length}）</div>
    ${!list.length?'<div class="empty">目前沒有錯題 👍 答錯的題目會自動收進這裡，答對即移除。</div>':
      `<button class="btn" style="margin:4px 0 14px" onclick="startWrongPractice()">開始複習全部錯題</button>`+
      list.map(q=>`<div class="rev-item"><div class="q"><span class="tag">${esc(q.ch)} · ${q.year}</span>${esc(q.stem||('第'+q.no+'題（圖表題）'))}</div>
        ${imgHtml(q)}<div class="a">正解 <b>${esc(ansStr(q).split('').join('、'))}</b></div>${q.expl?`<div class="expl">💡 ${esc(q.expl)}</div>`:''}</div>`).join('')}`;
}

/* ---------- fav ---------- */
function renderFav(){
  const set=new Set(S.fav);
  const list=R.filter(q=>set.has(q.id));
  $('#v-fav').innerHTML=`
    <div class="sect" style="margin-top:6px">⭐ 我的收藏（${list.length}）</div>
    ${!list.length?'<div class="empty">還沒有收藏題目。作答時點右上角的 ⭐ 就能把重點題收進來。</div>':
      `<button class="btn" style="margin:4px 0 14px" onclick="startFav()">開始練習收藏題</button>`+
      list.map(q=>`<div class="rev-item" style="border-color:var(--gold)"><div class="q"><span class="tag">${esc(q.ch)} · ${q.year}</span>${esc(q.stem||('第'+q.no+'題'))}</div>
        <div class="a">正解 <b>${esc(ansStr(q).split('').join('、'))}</b>　<span onclick="toggleFav('${q.id}');renderFav()" style="color:var(--bad);cursor:pointer;font-weight:700">✕ 移除</span></div>${q.expl?`<div class="expl">💡 ${esc(q.expl)}</div>`:''}</div>`).join('')}`;
}

/* ---------- 非選/混合題 ---------- */
let ncYear=null;
function renderNonchoice(){
  if(!NC.length){go('home');return;}
  const years=[...new Set(NC.map(q=>q.year))].sort().reverse();
  if(ncYear==null||!years.includes(ncYear)) ncYear=years[0];

    <button class="back" onclick="go('home')">‹ 返回</button>

    <div class="picker">${years.map(y=>`<button class="pbtn ${y===ncYear?'on':''}" onclick="ncYear=${y};renderNonchoice();window.scrollTo(0,0)">${y} 年</button>`).join('')}</div>
    ${list.map(q=>`<div class="card">
       <div>${CI(q.ch)?`<span class="tag">${esc(q.ch)}</span>`:''}<span class="tag" style="color:var(--sub);background:var(--line)">${q.year}年第${q.no}題</span></div>
       ${ctxHtml(q)}
       <div class="ncq" style="margin-top:6px">${esc(q.stem)}</div>
       ${imgHtml(q)}
       <details><summary>看參考詳解</summary><div class="ncref">${esc(q.expl)||'（詳解整理中）'}</div></details>
    </div>`).join('')}
    <p style="text-align:center;color:var(--sub);font-size:.72rem;margin-top:10px">非選擇題無法自動批改，此處提供翰林逐題詳解供對照。</p>`;
}

/* ---------- settings ---------- */
function renderSettings(){
  const done=Object.keys(S.rec).length;
  $('#v-settings').innerHTML=`
    <div class="sect" style="margin-top:6px">⚙️ 設定</div>
    <div class="card">
      <div class="setrow"><div class="l"><b>考試倒數</b><small>設定學測日期，首頁顯示倒數</small></div>
        <input type="date" value="${esc(S.settings.examDate||'')}" onchange="S.settings.examDate=this.value;save();renderSettings()"
          style="flex:0 0 auto;border:1.5px solid var(--line);border-radius:10px;padding:8px 10px;background:var(--card);color:var(--ink);font:inherit"></div>
      <div class="setrow"><div class="l"><b>深色模式</b><small>跟隨系統／手動</small></div>
        <div class="switch ${isDark()?'on':''}" onclick="toggleDark()"><i></i></div></div>
    </div>
    <div class="card">
      <div class="setrow" style="border:0"><div class="l"><b>學習進度</b><small>已作答 ${done} 題 · 錯題 ${S.wrong.length}</small></div>
        <button class="btn ghost" style="flex:0 0 auto;padding:10px 16px" onclick="resetAll()">清除</button></div>
    </div>
    <div class="card" style="font-size:.78rem;color:var(--sub);line-height:1.8">
      <b>關於</b><br>題目為 <b>大學入學考試中心 分科測驗 生物考科 官方公開試題（112–114）</b>，
      逐題詳解引自 <b>翰林 分科測驗精彩解析</b>（免費公開）。可練 ${QB.meta.usable} 題（單選＋多選，含圖表題）；另有 ${NC.length} 題混合題／非選附詳解。答案已對大考中心官方答案核對。僅供教學與自學練習。
    </div>`;
}
function resetAll(){ if(confirm('確定清除所有作答與錯題紀錄？（收藏會保留）')){S.rec={};S.wrong=[];S.daily={};save();renderSettings();alert('已清除');} }

/* ---------- theme ---------- */
function isDark(){ if(S.settings.dark==='dark')return true; if(S.settings.dark==='light')return false;
  return window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches; }
function applyTheme(){ const d=S.settings.dark; if(d==='auto')document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme',d); }
function toggleDark(){ S.settings.dark=isDark()?'light':'dark'; save(); applyTheme(); renderSettings(); }

/* ---------- boot ---------- */
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
renderHome();
</script>
